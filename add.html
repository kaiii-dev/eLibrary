<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add to Wishlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root{ --bg:#000; --accent:#ff000086; --text:#fff; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }
    .wrap{max-width:780px;margin:30px auto;padding:0 22px;}
    h1{margin-top:0}
    form{display:grid;grid-template-columns:1fr 1fr;gap:14px;background:#0f0f0f;border:1px solid #222;padding:18px;border-radius:14px;}
    label{font-size:12px;color:#bbb}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #222;background:#121212;color:#fff;outline:none;}
    .row-2{grid-column:span 2}
    .btn{background:var(--accent);border:none;color:#fff;padding:12px;border-radius:12px;cursor:pointer;font-weight:700}
    .btn:hover{box-shadow:0 0 12px var(--accent)}
    .msg{margin-top:12px;font-size:14px}
    .links-head{grid-column:span 2;margin-top:8px;font-size:14px;color:#ddd}
    .link-row{display:grid;grid-template-columns:1fr 1fr 120px 80px;gap:10px;align-items:center;background:#101010;border:1px solid #222;padding:10px;border-radius:12px}
    .link-actions{display:flex;gap:8px;justify-content:flex-end}
    .subtle{background:#141414;border:1px solid #222}
  </style>
</head>
<body>
  <!-- auth guard -->
  <script type="module" src="js/auth-guard.js"></script>

  <!-- Shared navbar -->
  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <div class="wrap">
    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <h1>Add Wishlist Item</h1>

    <form id="f">
      <div>
        <label>Title</label>
        <input name="title" required>
        <span class="field-error" id="err-title"></span>
      </div>
      <div>
        <label>Type</label>
        <select name="type" required>
          <option value="anime">Anime</option>
          <option value="manhwa">Manhwa</option>
          <option value="manhua">Manhua</option>
          <option value="manga">Manga</option>
          <option value="movie">Movie</option>
        </select>
      </div>

      <div>
        <label>Genre</label>
        <input name="genre" placeholder="e.g. Action, Romance">
      </div>
      <div>
        <label>Status</label>
        <select name="status" required>
          <option value="planning">Planning</option>
          <option value="watching">Watching</option>
          <option value="reading">Reading</option>
          <option value="completed">Completed</option>
          <option value="on_hold">On Hold</option>
          <option value="dropped">Dropped</option>
        </select>
      </div>

      <div>
        <label>Progress (Current Ep/Ch)</label>
        <input type="number" name="progress_current" min="0" placeholder="e.g. 5">
      </div>
      <div>
        <label>Total Ep/Ch</label>
        <input type="number" name="progress_total" min="0" placeholder="e.g. 24 (leave blank if unknown)">
      </div>

      <div>
        <label>Rating (1–10)</label>
        <input type="number" name="rating" min="1" max="10" step="0.5" placeholder="e.g. 8.5">
      </div>
      <div>
        <label>Streaming/Webtoon Site URL (single)</label>
        <input name="site_url" placeholder="(Optional) https://...">
      </div>

      <div class="row-2">
        <label>Personal Notes</label>
        <textarea name="notes" placeholder="Private notes about this title..." rows="2" style="width:100%;padding:10px;border-radius:10px;border:1px solid #222;background:#121212;color:#fff;outline:none;font-family:inherit;resize:vertical;"></textarea>
      </div>

      <div>
        <label>Preview Source</label>
        <select name="preview_source">
          <option value="">Auto/None</option>
          <option value="youtube">YouTube</option>
          <option value="tiktok">TikTok</option>
        </select>
      </div>

      <div class="row-2">
        <label>Cover Image (upload)</label>
        <img id="coverPreview" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;margin-bottom:8px;display:none" alt="Cover preview">
        <input type="file" name="cover_file" id="coverFile" accept="image/*" required>
        <span class="field-error" id="err-cover"></span>
      </div>

      <div class="row-2">
        <label>Preview/Trailer URL</label>
        <input name="preview_url" placeholder="YouTube/TikTok link">
      </div>

      <!-- MULTI LINKS -->
      <div class="links-head">Streaming/Webtoon Links (multiple)</div>
      <div class="row-2">
        <div id="links"></div>
        <div class="link-actions">
          <button class="btn subtle" type="button" id="addLinkBtn">+ Add Link</button>
        </div>
      </div>

      <div class="row-2">
        <button class="btn" type="submit">Save</button>
        <div id="msg" class="msg"></div>
      </div>
    </form>
  </div>

  <template id="linkRowTpl">
    <div class="link-row">
      <input name="source_label[]" placeholder="Label (e.g. Netflix/Muse/Webtoon)">
      <input name="source_url[]" placeholder="https://..." required>
      <select name="source_lang[]">
        <option value="eng">English</option>
        <option value="id">Indonesian</option>
        <option value="kr">Korean</option>
        <option value="my">Malay</option>
      </select>
      <button type="button" class="btn subtle remove">Remove</button>
    </div>
  </template>

  <script>
    // dynamic multi-links
    const linksWrap = document.getElementById('links');
    const tpl = document.getElementById('linkRowTpl');
    document.getElementById('addLinkBtn').addEventListener('click', () => {
      linksWrap.appendChild(tpl.content.firstElementChild.cloneNode(true));
      wireRemovers();
    });
    function wireRemovers(){
      linksWrap.querySelectorAll('.remove').forEach(b=>{
        b.onclick = (e)=> e.currentTarget.closest('.link-row').remove();
      });
    }
    wireRemovers();
  </script>

  <script type="module">
    import { addWishlistItem } from "./js/firebase-service.js";
    import { showToast } from "./js/toast.js";

    const form      = document.getElementById('f');
    const msg       = document.getElementById('msg');
    const submitBtn = form.querySelector('button[type="submit"]');
    const linksWrap = document.getElementById('links');
    const coverFile = document.getElementById('coverFile');
    const coverPreview = document.getElementById('coverPreview');

    function showMsg(text, ok=false){ msg.textContent = text; msg.style.color = ok ? '#8fff8f' : '#ff8f8f'; }
    function autoSource(url){
      if(/tiktok\.com/i.test(url)) return 'tiktok';
      if(/youtu\.be|youtube\.com/i.test(url)) return 'youtube';
      return '';
    }

    // Cover preview
    coverFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { coverPreview.src = URL.createObjectURL(file); coverPreview.style.display = 'block'; }
    });

    // Blur validation
    form.title.addEventListener('blur', () => {
      const empty = !form.title.value.trim();
      document.getElementById('err-title').textContent = empty ? 'Title is required.' : '';
      form.title.classList.toggle('invalid', empty);
    });
    coverFile.addEventListener('blur', () => {
      const empty = !coverFile.files.length;
      document.getElementById('err-cover').textContent = empty ? 'Cover image is required.' : '';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if(!form.title.value.trim()){ showToast('Title is required.', 'error'); return; }
      if(!form.type.value){ showToast('Type is required.', 'error'); return; }
      if(!coverFile.files.length){ showToast('Please choose a cover image.', 'error'); return; }

      const prevSrc = form.preview_source.value || autoSource(form.preview_url.value || '');
      const sources = [...linksWrap.querySelectorAll('.link-row')].map(row => ({
        label: row.querySelector('[name="source_label[]"]').value.trim(),
        url:   row.querySelector('[name="source_url[]"]').value.trim(),
        lang:  row.querySelector('[name="source_lang[]"]').value
      })).filter(s => s.url !== '');

      submitBtn.disabled = true; showMsg('Saving...');
      try{
        await addWishlistItem({
          title:            form.title.value.trim(),
          type:             form.type.value,
          genre:            form.genre.value.trim(),
          status:           form.status.value,
          site_url:         form.site_url.value.trim(),
          preview_url:      form.preview_url.value.trim(),
          preview_source:   prevSrc,
          sources,
          progress_current: form.progress_current.value !== '' ? Number(form.progress_current.value) : null,
          progress_total:   form.progress_total.value   !== '' ? Number(form.progress_total.value)   : null,
          rating:           form.rating.value            !== '' ? Number(form.rating.value)            : null,
          notes:            form.notes.value.trim(),
        }, coverFile.files[0]);
        showToast('Saved! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'home.html'; }, 900);
      }catch(err){
        showToast(err.message || 'Something went wrong.', 'error');
        showMsg('');
      }
      finally{ submitBtn.disabled = false; }
    });
  </script>
</body>
</html>
