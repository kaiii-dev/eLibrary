<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <title>Edit Wishlist Item</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root{ --bg:#000; --accent:#ff000086; --text:#fff; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }
    .wrap{max-width:780px;margin:30px auto;padding:0 22px;}
    h1{margin-top:0}
    form{display:grid;grid-template-columns:1fr 1fr;gap:14px;background:#0f0f0f;border:1px solid #222;padding:18px;border-radius:14px;}
    label{font-size:12px;color:#bbb}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #222;background:#121212;color:#fff;outline:none;}
    .row-2{grid-column:span 2}
    .btn{background:var(--accent);border:none;color:#fff;padding:12px;border-radius:12px;cursor:pointer;font-weight:700}
    .btn:hover{box-shadow:0 0 12px var(--accent)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:12px;font-size:14px}
    .links-head{grid-column:span 2;margin-top:8px;font-size:14px;color:#ddd}
    .link-row{display:grid;grid-template-columns:1fr 1fr 120px 80px;gap:10px;align-items:center;background:#101010;border:1px solid #222;padding:10px;border-radius:12px}
    .link-actions{display:flex;gap:8px;justify-content:flex-end}
    .subtle{background:#141414;border:1px solid #222}
    #coverPreview{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;margin-bottom:8px;display:none;}
  </style>
</head>
<body>
  <!-- auth guard -->
  <script type="module" src="js/auth-guard.js"></script>

  <!-- Shared navbar -->
  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <div class="wrap">
    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <h1>Edit Wishlist Item</h1>

    <form id="f">
      <div>
        <label>Title</label>
        <input name="title" required>
        <span class="field-error" id="err-title"></span>
      </div>
      <div>
        <label>Type</label>
        <select name="type" required>
          <option value="anime">Anime</option>
          <option value="manhwa">Manhwa</option>
          <option value="manhua">Manhua</option>
          <option value="manga">Manga</option>
          <option value="movie">Movie</option>
        </select>
      </div>

      <div>
        <label>Genre</label>
        <input name="genre" placeholder="e.g. Action, Romance">
      </div>
      <div>
        <label>Status</label>
        <select name="status" required>
          <option value="planning">Planning</option>
          <option value="watching">Watching</option>
          <option value="reading">Reading</option>
          <option value="completed">Completed</option>
          <option value="on_hold">On Hold</option>
          <option value="dropped">Dropped</option>
        </select>
      </div>

      <div>
        <label>Progress (Current Ep/Ch)</label>
        <input type="number" name="progress_current" min="0" placeholder="e.g. 5">
      </div>
      <div>
        <label style="display:flex;align-items:center;justify-content:space-between;">
          Total Ep/Ch
          <button type="button" id="btnAutoTotal"
            style="font-size:9px;padding:3px 8px;border-radius:6px;border:1px solid rgba(255,0,0,.3);background:rgba(255,0,0,.08);color:#ff9999;cursor:pointer;font-family:'Bungee',sans-serif;">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Auto
          </button>
        </label>
        <input type="number" name="progress_total" min="0" placeholder="e.g. 24">
        <div id="autoTotalMsg" style="font-size:9px;color:#555;margin-top:4px;display:none;"></div>
      </div>

      <div>
        <label>Streaming/Webtoon Site URL (single)</label>
        <input name="site_url" placeholder="(Optional) https://...">
      </div>

      <div class="row-2">
        <label>Personal Notes</label>
        <textarea name="notes" placeholder="Private notes about this title..." rows="2" style="width:100%;padding:10px;border-radius:10px;border:1px solid #222;background:#121212;color:#fff;outline:none;font-family:inherit;resize:vertical;"></textarea>
      </div>

      <div>
        <label>Preview Source</label>
        <select name="preview_source">
          <option value="">Auto/None</option>
          <option value="youtube">YouTube</option>
          <option value="tiktok">TikTok</option>
        </select>
      </div>

      <div class="row-2">
        <label>Cover Image</label>
        <img id="coverPreview" alt="Cover preview">
        <input type="file" id="coverFile" accept="image/*">
        <span style="font-size:11px;color:#666;margin-top:4px;display:block">Leave empty to keep current cover.</span>
      </div>

      <div class="row-2">
        <label>Preview/Trailer URL</label>
        <input name="preview_url" placeholder="YouTube/TikTok link">
      </div>

      <!-- MULTI LINKS -->
      <div class="links-head">Streaming/Webtoon Links (multiple)</div>
      <div class="row-2">
        <div id="links"></div>
        <div class="link-actions">
          <button class="btn subtle" type="button" id="addLinkBtn">+ Add Link</button>
        </div>
      </div>

      <div class="row-2">
        <button class="btn" type="submit" id="saveBtn">Update</button>
        <div id="msg" class="msg"></div>
      </div>
    </form>
  </div>

  <template id="linkRowTpl">
    <div class="link-row">
      <input name="source_label[]" placeholder="Label (e.g. Netflix/Muse/Webtoon)">
      <input name="source_url[]" placeholder="https://...">
      <select name="source_lang[]">
        <option value="eng">English</option>
        <option value="id">Indonesian</option>
        <option value="kr">Korean</option>
        <option value="my">Malay</option>
      </select>
      <button type="button" class="btn subtle remove">Remove</button>
    </div>
  </template>

  <script>
    // dynamic multi-links
    const linksWrap = document.getElementById('links');
    const tpl = document.getElementById('linkRowTpl');
    document.getElementById('addLinkBtn').addEventListener('click', () => {
      linksWrap.appendChild(tpl.content.firstElementChild.cloneNode(true));
      wireRemovers();
    });
    function wireRemovers(){
      linksWrap.querySelectorAll('.remove').forEach(b=>{
        b.onclick = (e)=> e.currentTarget.closest('.link-row').remove();
      });
    }
    wireRemovers();
  </script>

  <script type="module">
    import { getWishlistItem, updateFullWishlistItem } from "./js/firebase-service.js";
    import { showToast } from "./js/toast.js";

    const params = new URLSearchParams(location.search);
    const docId  = params.get('id');
    if (!docId) { location.replace('home.html'); }

    const form        = document.getElementById('f');
    const saveBtn     = document.getElementById('saveBtn');
    const coverPreview = document.getElementById('coverPreview');
    const coverFile   = document.getElementById('coverFile');
    const linksWrap   = document.getElementById('links');
    const tpl         = document.getElementById('linkRowTpl');
    const msg         = document.getElementById('msg');

    function showMsg(text, ok=false){ msg.textContent = text; msg.style.color = ok ? '#8fff8f' : '#ff8f8f'; }

    function autoSource(url){
      if(/tiktok\.com/i.test(url)) return 'tiktok';
      if(/youtu\.be|youtube\.com/i.test(url)) return 'youtube';
      return '';
    }

    // ── Auto-fetch total ep/ch ───────────────────────────────
    const JIKAN  = 'https://api.jikan.moe/v4';
    const TMDB   = '/api/tmdb';

    async function fetchTotalCount(title, type) {
      if (type === 'movie') return { count: 1, source: 'Movie' };

      // Anime → Jikan anime endpoint
      if (type === 'anime') {
        const res  = await fetch(`${JIKAN}/anime?q=${encodeURIComponent(title)}&limit=5`);
        const data = await res.json();
        const hit  = data.data?.find(a =>
          (a.title || '').toLowerCase().includes(title.toLowerCase()) ||
          (a.title_english || '').toLowerCase().includes(title.toLowerCase())
        ) || data.data?.[0];
        if (hit?.episodes) return { count: hit.episodes, source: `Jikan — ${hit.title}` };
        return null;
      }

      // Manga / Manhwa / Manhua / Novel → Jikan manga endpoint
      if (['manga','manhwa','manhua','novel'].includes(type)) {
        const res  = await fetch(`${JIKAN}/manga?q=${encodeURIComponent(title)}&limit=5`);
        const data = await res.json();
        const hit  = data.data?.find(m =>
          (m.title || '').toLowerCase().includes(title.toLowerCase()) ||
          (m.title_english || '').toLowerCase().includes(title.toLowerCase())
        ) || data.data?.[0];
        if (hit?.chapters) return { count: hit.chapters, source: `Jikan — ${hit.title}` };
        // Ongoing manhwa often have null chapters — report that
        if (hit) return { count: null, source: `${hit.title} — ongoing (no fixed chapter count)` };
        return null;
      }

      // TV show → TMDB total episodes across all seasons
      if (type === 'tv-show') {
        const res  = await fetch(`${TMDB}?path=search/tv&query=${encodeURIComponent(title)}`);
        const data = await res.json();
        const hit  = data.results?.[0];
        if (!hit?.id) return null;
        const det  = await fetch(`${TMDB}?path=tv/${hit.id}`);
        const d    = await det.json();
        const total = d.number_of_episodes;
        if (total) return { count: total, source: `TMDB — ${hit.name}` };
      }

      return null;
    }

    document.getElementById('btnAutoTotal').addEventListener('click', async () => {
      const btn  = document.getElementById('btnAutoTotal');
      const msgEl = document.getElementById('autoTotalMsg');
      const title = form.title.value.trim();
      const type  = form.type.value;

      if (!title) { msgEl.textContent = 'Fill in the title first.'; msgEl.style.color='#f44336'; msgEl.style.display='block'; return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
      msgEl.style.display = 'none';

      try {
        const result = await fetchTotalCount(title, type);
        if (!result) {
          msgEl.textContent = 'Could not find count — try updating the title first.';
          msgEl.style.color = '#f44336';
        } else if (result.count == null) {
          msgEl.textContent = result.source;
          msgEl.style.color = '#888';
        } else {
          form.progress_total.value = result.count;
          msgEl.textContent = `✓ ${result.source}`;
          msgEl.style.color = '#4caf50';
        }
        msgEl.style.display = 'block';
      } catch(e) {
        msgEl.textContent = 'Fetch failed — check connection.';
        msgEl.style.color = '#f44336';
        msgEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Auto';
      }
    });

    // Load existing item and pre-fill
    let item;
    try {
      item = await getWishlistItem(docId);
    } catch(e) {
      showToast('Item not found.', 'error');
      setTimeout(() => location.replace('home.html'), 1200);
    }

    if (item) {
      form.title.value            = item.title            || '';
      form.type.value             = item.type             || 'anime';
      form.genre.value            = item.genre            || '';
      // Map legacy status values to new ones
      const statusMap = { ongoing: 'watching', hiatus: 'on_hold' };
      form.status.value           = statusMap[item.status] || item.status || 'planning';
      form.site_url.value         = item.site_url         || '';
      form.preview_url.value      = item.preview_url      || '';
      form.preview_source.value   = item.preview_source   || '';
      if (item.progress_current != null) form.progress_current.value = item.progress_current;
      if (item.progress_total   != null) form.progress_total.value   = item.progress_total;
      // rating is now managed via Reviews — not editable here
      form.notes.value            = item.notes            || '';

      if (item.cover_path) {
        coverPreview.src = item.cover_path;
        coverPreview.style.display = 'block';
      }

      if (Array.isArray(item.sources)) {
        item.sources.forEach(s => {
          const row = tpl.content.firstElementChild.cloneNode(true);
          row.querySelector('[name="source_label[]"]').value = s.label || '';
          row.querySelector('[name="source_url[]"]').value   = s.url   || '';
          row.querySelector('[name="source_lang[]"]').value  = s.lang  || 'eng';
          linksWrap.appendChild(row);
        });
        // Re-wire removers after pre-fill
        linksWrap.querySelectorAll('.remove').forEach(b=>{
          b.onclick = (e)=> e.currentTarget.closest('.link-row').remove();
        });
      }
    }

    // Cover preview on new file pick
    coverFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        coverPreview.src = URL.createObjectURL(file);
        coverPreview.style.display = 'block';
      }
    });

    // Title blur validation
    form.title.addEventListener('blur', () => {
      const empty = !form.title.value.trim();
      document.getElementById('err-title').textContent = empty ? 'Title is required.' : '';
      form.title.classList.toggle('invalid', empty);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!form.title.value.trim()) { showToast('Title is required.', 'error'); return; }

      const newFile = coverFile.files[0] || null;
      const prevSrc = form.preview_source.value || autoSource(form.preview_url.value || '');

      const sources = [...linksWrap.querySelectorAll('.link-row')].map(row => ({
        label: row.querySelector('[name="source_label[]"]').value.trim(),
        url:   row.querySelector('[name="source_url[]"]').value.trim(),
        lang:  row.querySelector('[name="source_lang[]"]').value
      })).filter(s => s.url !== '');

      saveBtn.disabled = true;
      showMsg('Saving...');
      try {
        await updateFullWishlistItem(docId, {
          title:            form.title.value.trim(),
          type:             form.type.value,
          genre:            form.genre.value.trim(),
          status:           form.status.value,
          site_url:         form.site_url.value.trim(),
          preview_url:      form.preview_url.value.trim(),
          preview_source:   prevSrc,
          sources,
          progress_current: form.progress_current.value !== '' ? Number(form.progress_current.value) : null,
          progress_total:   form.progress_total.value   !== '' ? Number(form.progress_total.value)   : null,
          // rating synced via submitReview — not saved here
          notes:            form.notes.value.trim(),
        }, newFile);
        showToast('Updated! Redirecting...', 'success');
        setTimeout(() => location.href = 'home.html', 900);
      } catch(err) {
        showToast(err.message || 'Update failed.', 'error');
        showMsg('');
      } finally {
        saveBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
