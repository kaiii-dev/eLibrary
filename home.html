<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <title>E-Library Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root{
      --bg:#000000; --accent:#ff000086; --card:#111; --text:#f5f5f5; --muted:#bbbbbb; --chip:#1a1a1a;
    }
    .flag{ width:16px; height:12px; display:inline-block; border-radius:2px; object-fit:cover; }
    .links{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    *{box-sizing:border-box}
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee", Arial, sans-serif; min-height:100vh; display:flex; flex-direction:column; }

    /* TABS */
    .tabs-bar{
      display:flex; gap:4px; padding:10px 22px; align-items:center;
      background:#050505; border-bottom:1px solid #1a1a1a;
      position:sticky; top:60px; z-index:60; overflow-x:auto;
    }
    .tab{
      display:inline-flex; align-items:center; gap:7px; padding:7px 15px;
      border-radius:10px; border:1px solid transparent; cursor:pointer;
      font-family:"Bungee",Arial,sans-serif; font-size:12px; color:#555;
      background:transparent; white-space:nowrap; transition:all .15s;
    }
    .tab:hover{ color:#ccc; background:rgba(255,255,255,0.05); }
    .tab.active{
      color:#fff; background:rgba(255,0,0,0.15);
      border-color:rgba(255,0,0,0.3);
      box-shadow:0 0 10px rgba(255,0,0,0.08);
    }
    .tab i{ font-size:12px; }

    /* SEARCH */
    .toolbar{ display:flex; gap:10px; padding:12px 22px; align-items:center; flex-wrap:wrap; background:#0a0a0a; border-bottom:1px solid rgba(255,0,0,0.1); position:sticky; top:108px; z-index:55; }
    .search{ flex:1; min-width:220px; display:flex; align-items:center; gap:8px; background:#0f0f0f; border:1px solid #222; border-radius:12px; padding:10px 12px; transition:border-color .15s; }
    .search:focus-within{ border-color:rgba(255,0,0,0.4); }
    .search input{ flex:1; border:none; outline:none; background:transparent; color:#fff; font-size:13px; font-family:"Bungee",Arial,sans-serif; }
    .filter{ display:flex; gap:10px; align-items:center; }
    .select, .btn{ background:#121212; color:#fff; border:1px solid #222; border-radius:12px; padding:10px 12px; cursor:pointer; font-family:"Bungee",Arial,sans-serif; font-size:12px; outline:none; }
    .btn{ background:var(--accent); border:none; font-weight:700; }
    .btn:hover{ box-shadow:0 0 14px var(--accent); }

    /* GALLERY */
    .wrap{ padding:22px; }
    .grid{ display:grid; gap:18px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .card{ background:var(--card); border:1px solid #1b1b1b; border-radius:16px; overflow:hidden;
           box-shadow:0 6px 16px rgba(0,0,0,0.35); position:relative; transition:transform .15s ease, box-shadow .2s;
           text-decoration:none; color:inherit; display:block; cursor:pointer; }
    .card:hover{ transform:translateY(-4px); box-shadow:0 12px 28px rgba(255,0,0,0.2), 0 0 0 1px rgba(255,0,0,0.15); }
    .thumb{ width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:#0d0d0d; }
    .content{ padding:12px; }
    .title{ font-size:16px; line-height:1.2; margin:0 0 6px; }
    .meta{ color:var(--muted); font-size:12px; margin-bottom:8px; display:flex; gap:8px; flex-wrap:wrap; }
    .chip{ background:#1a1a1a; padding:4px 8px; border-radius:999px; border:1px solid #222; font-size:11px; }
    .row{ display:flex; gap:10px; align-items:center; }
    .link, .preview{ text-decoration:none; font-size:12px; padding:8px 10px; border-radius:10px; border:1px solid #222;
                     display:inline-flex; align-items:center; gap:6px; color:#fff; background:#141414; }
    .link:hover, .preview:hover{ border-color:var(--accent); box-shadow:0 0 10px var(--accent); }
    .icon{ width:16px; height:16px; display:inline-block; }
    .empty{ opacity:.7; text-align:center; padding:40px; border:1px dashed #333; border-radius:16px; margin-top:20px; }

    .quick-action-btn {
      position:absolute; bottom:8px; right:8px; width:32px; height:32px;
      border-radius:50%; background:rgba(0,0,0,0.78); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; text-decoration:none; opacity:0; transition:opacity .15s; z-index:2;
    }
    .card:hover .quick-action-btn { opacity:1; }

    /* FAB */
    .fab{ position:fixed; right:22px; bottom:22px; width:56px; height:56px; border-radius:50%;
          background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center;
          font-size:28px; font-weight:900; cursor:pointer; box-shadow:0 10px 20px rgba(255,0,0,0.25); border: none; }
    .fab:hover{ box-shadow:0 0 16px var(--accent); transform:translateY(-1px); }
  </style>
</head>
<body>
  <!-- auth guard -->
  <script type="module" src="js/auth-guard.js"></script>

  <!-- Shared navbar -->
  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <!-- TYPE TABS -->
  <div class="tabs-bar">
    <button class="tab active" data-type=""><i class="fa-solid fa-border-all"></i> All</button>
    <button class="tab" data-type="anime">  <i class="fa-solid fa-tv"></i>        Anime</button>
    <button class="tab" data-type="manhwa"> <i class="fa-solid fa-book-open"></i>  Manhwa</button>
    <button class="tab" data-type="manhua"> <i class="fa-solid fa-book"></i>       Manhua</button>
    <button class="tab" data-type="manga">  <i class="fa-solid fa-scroll"></i>     Manga</button>
    <button class="tab" data-type="movie">  <i class="fa-solid fa-film"></i>       Movies</button>
    <button class="tab" data-type="__feed"><i class="fa-solid fa-rss"></i>         Feed</button>
  </div>

  <!-- SEARCH / FILTER -->
  <section class="toolbar">
    <div class="search">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 2a8 8 0 015.292 13.707l4.5 4.5-1.414 1.414-4.5-4.5A8 8 0 1110 2zm0 2a6 6 0 100 12A6 6 0 0010 4z"/></svg>
      <input id="q" type="text" placeholder="Search title or genre..." />
    </div>
    <div class="filter">
      <select id="status" class="select">
        <option value="">All Status</option>
        <option value="watching">Watching</option>
        <option value="reading">Reading</option>
        <option value="completed">Completed</option>
        <option value="on_hold">On Hold</option>
        <option value="dropped">Dropped</option>
        <option value="planning">Planning</option>
      </select>
      <button id="searchBtn" class="btn">Search</button>
    </div>
  </section>

  <!-- GALLERY -->
  <main class="wrap">
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">
      <i class="fa-solid fa-book-open" style="font-size:48px;opacity:.3;display:block;margin-bottom:12px"></i>
      <p style="margin:0 0 6px">No items found.</p>
      <p style="font-size:12px;color:#666;margin:0">Adjust your filters or <a href="add.html" style="color:#ff4444">add a new item</a>.</p>
    </div>

    <!-- Infinite scroll sentinel + loader -->
    <div id="scrollSentinel" style="height:1px;margin-top:10px;"></div>
    <div id="loadMoreSpinner" style="display:none;text-align:center;padding:20px;color:#555;font-size:12px;">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading more...
    </div>

    <!-- FEED PANEL -->
    <div id="feedPanel" style="display:none;max-width:680px;margin:0 auto;">
      <div id="feedList"></div>
    </div>
  </main>

  <!-- Floating Add button -->
  <button class="fab" title="Add Wishlist" onclick="location.href='add.html'">+</button>

  <!-- Page logic -->
  <script type="module">
    import { getWishlistPage, getAllFriendsActivity, getWishlist } from "./js/firebase-service.js";

    const PAGE_SIZE = 24;

    const grid           = document.getElementById('grid');
    const empty          = document.getElementById('empty');
    const sentinel       = document.getElementById('scrollSentinel');
    const loadMoreSpinner= document.getElementById('loadMoreSpinner');
    const feedPanel      = document.getElementById('feedPanel');
    const feedList       = document.getElementById('feedList');
    const toolbar        = document.querySelector('.toolbar');
    const q              = document.getElementById('q');
    const statusSel      = document.getElementById('status');
    const btn            = document.getElementById('searchBtn');

    let activeType = '';
    let feedLoaded = false;

    // Pagination state
    let allItems  = [];   // accumulated pages
    let curLastDoc = null; // Firestore cursor
    let hasMore   = true;
    let fetching  = false;

    const statusLabel = { watching:'Watching', reading:'Reading', completed:'Completed', on_hold:'On Hold', dropped:'Dropped', planning:'Planning', ongoing:'Watching', hiatus:'On Hold' };

    function timeAgo(ts) {
      if (!ts) return '';
      const diff = Date.now() - (ts.toMillis?.() || new Date(ts).getTime());
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    function actionText(act) {
      const t = `<strong>${act.itemTitle || 'a title'}</strong>`;
      switch (act.type) {
        case 'added':          return `added ${t} to their library`;
        case 'completed':      return `completed ${t}`;
        case 'dropped':        return `dropped ${t}`;
        case 'rated':          return `rated ${t} ★${act.rating}`;
        case 'status_changed': return `marked ${t} as ${(act.newStatus||'').replace('_',' ')}`;
        default:               return `updated ${t}`;
      }
    }

    async function loadFeed() {
      feedList.innerHTML = `<div style="text-align:center;padding:40px;color:#555;font-size:12px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading activity...</div>`;
      try {
        const acts = await getAllFriendsActivity();
        const myItems = await getWishlist();
        const myTitleMap = new Map(myItems.map(i => [(i.title||'').toLowerCase().trim(), i.id]));
        if (!acts.length) {
          feedList.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#444;font-size:12px;"><i class="fa-solid fa-rss" style="font-size:36px;opacity:.15;display:block;margin-bottom:14px"></i>No friend activity yet.<br>Add friends to see what they're watching!</div>`;
          return;
        }
        feedList.innerHTML = acts.map(act => `
          <div data-itemid="${myTitleMap.get((act.itemTitle||'').toLowerCase().trim()) || ''}" data-itemtitle="${act.itemTitle || ''}" style="display:flex;gap:14px;background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:14px;margin-bottom:12px;align-items:center;cursor:pointer;">
            ${act.coverPath ? `<img src="${act.coverPath}" style="width:72px;height:100px;object-fit:cover;border-radius:10px;flex-shrink:0;background:#0d0d0d;" onerror="this.style.display='none'">` : ''}
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;overflow:hidden;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:rgba(255,0,0,.5);">
                  ${act.friendPhoto ? `<img src="${act.friendPhoto}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">` : `<i class="fa-solid fa-circle-user" style="font-size:13px"></i>`}
                </div>
                <span style="font-size:12px;color:#ff8888;">${act.friendUsername || 'Friend'}</span>
                <span style="font-size:10px;color:#333;margin-left:auto;">${timeAgo(act.timestamp)}</span>
              </div>
              <div style="font-size:13px;color:#bbb;line-height:1.5;">${actionText(act)}</div>
              ${act.itemType ? `<div style="margin-top:8px;"><span style="font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.18);color:#ff8888;">${act.itemType.toUpperCase()}</span></div>` : ''}
            </div>
          </div>`).join('');
        feedList.querySelectorAll('[data-itemtitle]').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.itemid;
            if (id) location.href = `detail.html?id=${id}`;
            else location.href = `explore.html?q=${encodeURIComponent(el.dataset.itemtitle || '')}`;
          });
        });
        feedLoaded = true;
      } catch(e) {
        feedList.innerHTML = `<div style="text-align:center;padding:40px;color:#555;font-size:12px;">${e.message || 'Failed to load feed.'}</div>`;
      }
    }

    // Tab wiring
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeType = tab.dataset.type;

        const isFeed = activeType === '__feed';
        toolbar.style.display    = isFeed ? 'none' : '';
        grid.style.display       = isFeed ? 'none' : '';
        sentinel.style.display   = isFeed ? 'none' : '';
        empty.style.display      = 'none';
        feedPanel.style.display  = isFeed ? '' : 'none';

        if (isFeed) { loadFeed(); }
        else { resetAndLoad(); }
      });
    });

    function showSkeletons() {
      grid.innerHTML = '';
      empty.style.display = 'none';
      for (let i = 0; i < 8; i++) {
        grid.insertAdjacentHTML('beforeend', `
          <div class="skeleton-card">
            <div class="skeleton-thumb"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
          </div>
        `);
      }
    }

    // Reset pagination state and load first page
    async function resetAndLoad() {
      allItems   = [];
      curLastDoc = null;
      hasMore    = true;
      fetching   = false;
      showSkeletons();
      await fetchNextPage();
    }

    // Fetch next page from Firestore and append
    async function fetchNextPage() {
      if (fetching || !hasMore) return;
      fetching = true;
      loadMoreSpinner.style.display = '';

      try {
        const result = await getWishlistPage({ lastDoc: curLastDoc, pageSize: PAGE_SIZE });
        allItems   = [...allItems, ...result.items];
        curLastDoc = result.lastDoc;
        hasMore    = result.hasMore;
      } catch(e) {
        console.error('Failed to load page:', e);
      }

      fetching = false;
      loadMoreSpinner.style.display = 'none';
      filterAndRender();
    }

    // Client-side filter on all loaded items
    function filterAndRender() {
      const qVal      = (q?.value || '').trim().toLowerCase();
      const typeVal   = activeType;
      const statusVal = statusSel?.value || '';

      let items = allItems;
      if (qVal)      items = items.filter(i =>
        (i.title  || '').toLowerCase().includes(qVal) ||
        (i.genre  || '').toLowerCase().includes(qVal)
      );
      if (typeVal)   items = items.filter(i => (i.type || '').toLowerCase() === typeVal);
      if (statusVal) items = items.filter(i => {
        const s = (i.status || '').toLowerCase();
        const mapped = s === 'ongoing' ? 'watching' : s === 'hiatus' ? 'on_hold' : s;
        return mapped === statusVal;
      });

      render(items);
    }

    function makeCard(it) {
      const imgSrc = it.cover_path ? it.cover_path : (it.cover_url || 'https://via.placeholder.com/400x533?text=No+Image');
      const status = statusLabel[it.status] || (it.status||'').toUpperCase();
      const last   = it.last_chapter ? `Ch. ${it.last_chapter}` : '';
      const hasProg = it.progress_current != null;
      const progPct = (hasProg && it.progress_total) ? Math.min(100, Math.round((it.progress_current / it.progress_total) * 100)) : null;
      const progText = hasProg ? (it.progress_total ? `${it.progress_current}/${it.progress_total}` : `Ep/Ch ${it.progress_current}`) : '';
      const ratingHtml = it.rating != null ? `<span class="chip" style="color:#f5c518;border-color:#f5c51833">★ ${it.rating}</span>` : '';

      const isWatchable = ['anime','movie'].includes((it.type||'').toLowerCase());
      const isReadable  = ['manga','manhwa','manhua'].includes((it.type||'').toLowerCase());
      const quickLink   = isWatchable
        ? `<a href="watch.html?id=${it.id}&from=detail" class="quick-action-btn" onclick="event.stopPropagation()" title="Watch Now"><i class="fa-solid fa-play"></i></a>`
        : isReadable
        ? `<a href="read.html?id=${it.id}" class="quick-action-btn" onclick="event.stopPropagation()" title="Read Now"><i class="fa-solid fa-book-open"></i></a>`
        : '';

      const card = document.createElement('a');
      card.className = 'card';
      card.href = `detail.html?id=${it.id}`;
      card.innerHTML = `
        <img class="thumb" src="${imgSrc}" alt="${it.title || ''}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x533?text=No+Image'">
        ${quickLink}
        <div class="content">
          <h3 class="title">${it.title || ''}</h3>
          <div class="meta">
            <span class="chip">${(it.type||'').toUpperCase()}</span>
            ${it.genre ? `<span class="chip">${it.genre}</span>` : ''}
            ${status ? `<span class="chip">${status}</span>` : ''}
            ${last ? `<span class="chip">${last}</span>` : ''}
            ${ratingHtml}
          </div>
          ${hasProg && progPct != null ? `
          <div style="margin-top:6px">
            <div style="height:4px;background:#1a1a1a;border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${progPct}%;background:linear-gradient(90deg,#ff4444,#ff8800);border-radius:999px"></div>
            </div>
            <div style="font-size:10px;color:#555;margin-top:2px">${progText}</div>
          </div>` : ''}
        </div>
      `;
      return card;
    }

    function render(items) {
      grid.innerHTML = '';
      if (!items || items.length === 0) {
        empty.style.display = hasMore ? 'none' : 'block';
        return;
      }
      empty.style.display = 'none';
      const frag = document.createDocumentFragment();
      items.forEach(it => frag.appendChild(makeCard(it)));
      grid.appendChild(frag);
      // If page isn't tall enough to scroll, auto-fetch next page
      if (hasMore) maybeLoadMore();
    }

    // Trigger load if sentinel is near or within the viewport
    function maybeLoadMore() {
      if (fetching || !hasMore) return;
      const rect = sentinel.getBoundingClientRect();
      if (rect.top <= window.innerHeight + 300) {
        fetchNextPage();
      }
    }

    // Scroll-based trigger — reliable across all browsers
    window.addEventListener('scroll', () => { maybeLoadMore(); }, { passive: true });

    // Search button — reset & reload from Firestore
    if (btn) btn.addEventListener('click', resetAndLoad);

    // Live search — filter already-loaded items (debounced 250ms)
    let _searchTimer;
    if (q) {
      q.addEventListener('input', () => {
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(filterAndRender, 250);
      });
      q.addEventListener('keydown', (e) => { if (e.key === 'Enter') filterAndRender(); });
    }

    // Status dropdown — filter already-loaded items instantly
    if (statusSel) statusSel.addEventListener('change', filterAndRender);

    resetAndLoad();
  </script>
</body>
</html>
