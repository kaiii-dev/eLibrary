<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <title>Edit Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root{ --bg:#000; --accent:#ff000086; --text:#fff; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }
    .wrap{ max-width:720px; margin:24px auto; padding:0 22px; }
    form{ display:grid; grid-template-columns:1fr 1fr; gap:14px; background:#0f0f0f; border:1px solid #222; padding:20px; border-radius:14px; }
    label{ font-size:12px; color:#bbb; display:block; margin-bottom:6px; }
    input,select,textarea{ width:100%; padding:10px; border-radius:10px; border:1px solid #222; background:#121212; color:#fff; outline:none; font-family:"Bungee",Arial,sans-serif; font-size:12px; box-sizing:border-box; transition:border-color .15s; }
    input:focus,select:focus,textarea:focus{ border-color:rgba(255,0,0,0.4); }
    .row-2{ grid-column:span 2; }
    .btn{ background:var(--accent); border:none; color:#fff; padding:12px; border-radius:12px; cursor:pointer; font-weight:700; font-family:"Bungee",Arial,sans-serif; transition:box-shadow .15s; }
    .btn:hover:not(:disabled){ box-shadow:0 0 14px var(--accent); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }
    .tag-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
    .tag-opt{ display:none; }
    .tag-lbl{ padding:5px 12px; border-radius:999px; border:1px solid #333; background:#181818; font-size:11px; color:#888; cursor:pointer; transition:all .15s; user-select:none; }
    .tag-opt:checked + .tag-lbl{ border-color:rgba(255,0,0,0.4); background:rgba(255,0,0,0.12); color:#ff9999; }
  </style>
</head>
<body>
  <script type="module" src="js/auth-guard.js"></script>
  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <div class="wrap">
    <a id="backBtn" href="platforms.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <h1 style="margin-top:0">Edit Platform</h1>

    <div id="loading" style="color:#666;padding:40px 0">Loading...</div>

    <form id="f" style="display:none">
      <div class="row-2">
        <label>Name</label>
        <input name="name" id="name" required>
        <span class="field-error" id="err-name"></span>
      </div>
      <div class="row-2">
        <label>URL</label>
        <input name="url" id="url" placeholder="https://..." required>
        <span class="field-error" id="err-url"></span>
      </div>
      <div>
        <label>Language</label>
        <select name="language" id="language">
          <option value="en">English</option>
          <option value="id">Indonesian</option>
          <option value="kr">Korean</option>
          <option value="my">Malay</option>
          <option value="all">Multi-language</option>
        </select>
      </div>
      <div>
        <label>Notes <span style="color:#555;font-size:10px">(optional)</span></label>
        <input name="notes" id="notes" placeholder="e.g. Free up to Ch.50...">
      </div>
      <div class="row-2">
        <label>Tags</label>
        <div class="tag-grid">
          <input class="tag-opt" type="checkbox" id="tag-free"     value="Free"     name="tags"><label class="tag-lbl" for="tag-free">Free</label>
          <input class="tag-opt" type="checkbox" id="tag-premium"  value="Premium"  name="tags"><label class="tag-lbl" for="tag-premium">Premium</label>
          <input class="tag-opt" type="checkbox" id="tag-sub"      value="Sub"      name="tags"><label class="tag-lbl" for="tag-sub">Sub</label>
          <input class="tag-opt" type="checkbox" id="tag-dub"      value="Dub"      name="tags"><label class="tag-lbl" for="tag-dub">Dub</label>
          <input class="tag-opt" type="checkbox" id="tag-official" value="Official" name="tags"><label class="tag-lbl" for="tag-official">Official</label>
          <input class="tag-opt" type="checkbox" id="tag-fantl"    value="Fan-TL"   name="tags"><label class="tag-lbl" for="tag-fantl">Fan-TL</label>
        </div>
      </div>
      <div class="row-2">
        <label>Icon <span style="color:#555;font-size:10px">(leave empty to keep current)</span></label>
        <img id="iconPreview" style="width:72px;height:72px;border-radius:50%;object-fit:cover;background:#111;margin-bottom:8px;border:2px solid rgba(255,0,0,0.3)" alt="Icon preview">
        <input type="file" id="iconFile" accept="image/*">
      </div>
      <div class="row-2" style="display:flex;gap:12px;align-items:center">
        <button class="btn" type="submit" id="saveBtn">Save Changes</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { getDoc, doc }          from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { updatePlatform }       from "./js/firebase-service.js";
    import { showToast }            from "./js/toast.js";
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore }         from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { firebaseConfig }       from "./js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const params = new URLSearchParams(location.search);
    const docId  = params.get('id');
    const pType  = params.get('type') || 'streaming';
    document.getElementById('backBtn').href = `platforms.html?type=${pType}`;
    if (!docId){ location.replace('platforms.html'); }

    // Load platform data
    const snap = await getDoc(doc(db, 'platforms', docId));
    if (!snap.exists()){ showToast('Platform not found.','error'); setTimeout(()=>location.replace('platforms.html'),900); }

    const p = { id: snap.id, ...snap.data() };
    document.getElementById('loading').style.display = 'none';
    document.getElementById('f').style.display = 'grid';

    document.getElementById('name').value     = p.name     || '';
    document.getElementById('url').value      = p.url      || '';
    document.getElementById('language').value = p.language || 'en';
    document.getElementById('notes').value    = p.notes    || '';
    document.getElementById('iconPreview').src = p.icon_path || '';

    // Pre-check tags
    (p.tags || []).forEach(tag => {
      const map = { 'Free':'tag-free','Premium':'tag-premium','Sub':'tag-sub','Dub':'tag-dub','Official':'tag-official','Fan-TL':'tag-fantl' };
      const el = document.getElementById(map[tag]);
      if (el) el.checked = true;
    });

    // Icon preview on file change
    const iconFile = document.getElementById('iconFile');
    iconFile.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file){ document.getElementById('iconPreview').src = URL.createObjectURL(file); }
    });

    // Submit
    const f = document.getElementById('f');
    const saveBtn = document.getElementById('saveBtn');

    f.addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const url  = document.getElementById('url').value.trim();
      if (!name){ showToast('Name is required.', 'error'); return; }
      if (!url) { showToast('URL is required.',  'error'); return; }

      const tags = [...f.querySelectorAll('input[name="tags"]:checked')].map(c => c.value);
      const newFile = iconFile.files[0] || null;

      saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
      try {
        await updatePlatform(docId, {
          name,
          url,
          language: document.getElementById('language').value,
          notes:    document.getElementById('notes').value.trim(),
          tags,
        }, newFile);
        showToast('Platform updated!', 'success');
        setTimeout(() => { location.href = `platforms.html?type=${pType}`; }, 900);
      } catch(err) {
        showToast(err.message || 'Update failed.', 'error');
      } finally { saveBtn.disabled = false; saveBtn.textContent = 'Save Changes'; }
    });
  </script>
</body>
</html>
