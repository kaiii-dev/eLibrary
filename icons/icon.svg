<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="spineGrad" x1="256" y1="88" x2="256" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="50%"  stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#b80000"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Left page -->
  <path d="M96 120 Q96 96 120 96 L244 96 L244 424 Q224 414 204 414 L120 414 Q96 414 96 390 Z"
        fill="#1c1c1c" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
  <!-- Left page lines -->
  <line x1="124" y1="164" x2="214" y2="164" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <line x1="124" y1="206" x2="214" y2="206" stroke="rgba(255,255,255,0.2)"  stroke-width="8"  stroke-linecap="round"/>
  <line x1="124" y1="244" x2="214" y2="244" stroke="rgba(255,255,255,0.2)"  stroke-width="8"  stroke-linecap="round"/>
  <line x1="124" y1="282" x2="190" y2="282" stroke="rgba(255,255,255,0.2)"  stroke-width="8"  stroke-linecap="round"/>

  <!-- Right page -->
  <path d="M416 120 Q416 96 392 96 L268 96 L268 424 Q288 414 308 414 L392 414 Q416 414 416 390 Z"
        fill="#1c1c1c" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
  <!-- Right page lines -->
  <line x1="298" y1="164" x2="388" y2="164" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <line x1="298" y1="206" x2="388" y2="206" stroke="rgba(255,255,255,0.2)"  stroke-width="8"  stroke-linecap="round"/>
  <line x1="298" y1="244" x2="388" y2="244" stroke="rgba(255,255,255,0.2)"  stroke-width="8"  stroke-linecap="round"/>
  <line x1="298" y1="282" x2="364" y2="282" stroke="rgba(255,255,255,0.2)"  stroke-width="8"  stroke-linecap="round"/>

  <!-- Spine -->
  <rect x="244" y="88" width="24" height="336" rx="6"
        fill="url(#spineGrad)" filter="url(#glow)"/>
</svg>
