<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform — E-Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root{ --bg:#000; --accent:#ff000086; --text:#fff; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }

    /* toolbar */
    .toolbar{
      display:flex; align-items:center; flex-wrap:wrap; gap:12px;
      padding:14px 22px; background:#050505;
      border-bottom:1px solid rgba(255,0,0,.12);
      position:sticky; top:60px; z-index:60;
    }
    .toolbar-title{ font-size:18px; flex:1; min-width:160px; }

    /* wrap */
    .wrap{ padding:22px; max-width:1200px; margin:0 auto; }

    /* Sources sub-section — reuse .p-grid / .p-card from platforms.html look */
    .src-grid{
      display:grid; gap:14px;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    }
    .src-card{
      background:#111; border:1px solid #1e1e1e; border-radius:16px;
      padding:16px 12px 12px; text-align:center; position:relative;
      transition:transform .18s, box-shadow .2s, border-color .2s;
      display:flex; flex-direction:column; align-items:center; gap:6px;
    }
    .src-card .src-visit-btn { margin-top:auto; }
    .src-card:hover{
      transform:translateY(-3px);
      box-shadow:0 0 22px rgba(255,0,0,.2), 0 0 0 1px rgba(255,0,0,.15);
      border-color:rgba(255,0,0,.2);
    }
    .src-icon{
      width:62px; height:62px; border-radius:50%; object-fit:cover;
      background:#0f0f0f; display:block; border:2px solid rgba(255,0,0,.2);
      margin:4px auto 6px;
    }
    .src-name{ font-size:12px; line-height:1.3; margin-bottom:2px; }
    .src-tags{ display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:4px; }
    .src-tag{
      padding:3px 8px; border-radius:999px; font-size:9px; border:1px solid;
      white-space:nowrap;
    }
    .src-visit-btn{
      display:flex; align-items:center; justify-content:center; gap:5px;
      width:100%; margin-top:6px; padding:6px 0; border-radius:9px; border:none;
      background:#cc0000; color:#fff; font-family:"Bungee",Arial,sans-serif;
      font-size:10px; cursor:pointer; transition:background .15s;
    }
    .src-visit-btn:hover{ background:#e00; }
    .src-status{
      position:absolute; top:9px; left:9px;
      width:8px; height:8px; border-radius:50%; background:#333; border:1px solid #444;
    }
    .src-status.online { background:#4caf50; border-color:#388e3c; box-shadow:0 0 5px #4caf5088; }
    .src-status.offline{ background:#f44336; border-color:#c62828; }

    .src-empty{
      grid-column:1/-1; text-align:center; padding:30px; color:#444; font-size:12px;
    }

    /* add source button */
    .src-add-btn{
      display:flex; align-items:center; gap:6px;
      padding:7px 16px; border-radius:20px; border:1px solid rgba(255,0,0,.35);
      background:rgba(255,0,0,.1); color:#fff; font-family:"Bungee",Arial,sans-serif;
      font-size:11px; cursor:pointer; transition:all .15s;
    }
    .src-add-btn:hover{ background:rgba(255,0,0,.2); border-color:rgba(255,0,0,.6); }

    /* owned source card controls */
    .src-card-actions{ display:flex; gap:6px; margin-top:6px; }
    .src-edit-btn, .src-del-btn{
      flex:1; padding:5px 0; border-radius:7px; border:1px solid #2a2a2a;
      background:#161616; color:#888; font-family:"Bungee",Arial,sans-serif;
      font-size:9px; cursor:pointer; transition:all .15s;
    }
    .src-edit-btn:hover{ color:#fff; border-color:#555; }
    .src-del-btn:hover{ color:#f44336; border-color:#f44336; }

    /* source sub-tabs */
    .src-subtabs{ display:flex; gap:6px; margin-bottom:16px; }
    .src-subtab{
      padding:5px 14px; border-radius:8px; border:1px solid #222;
      background:transparent; color:#555; font-family:"Bungee",Arial,sans-serif;
      font-size:11px; cursor:pointer; transition:all .15s;
    }
    .src-subtab:hover{ color:#ccc; border-color:#444; }
    .src-subtab.active{ background:rgba(255,0,0,.15); border-color:rgba(255,0,0,.35); color:#fff; }

    /* loading skeleton */
    .skel-shelf{ display:flex; gap:12px; margin-bottom:36px; }
    .skel-card{
      flex:0 0 130px; border-radius:10px; background:#111; overflow:hidden;
    }
    .skel-img{
      width:130px; height:180px;
      background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);
      background-size:200% 100%; animation:shimmer 1.4s infinite;
    }
    .skel-line{
      height:10px; border-radius:5px; margin:8px 8px 4px;
      background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);
      background-size:200% 100%; animation:shimmer 1.4s infinite;
    }
    @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
  <script type="module" src="js/auth-guard.js"></script>

  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title"><i class="fa-solid fa-circle-play" style="color:#cc0000;margin-right:8px;"></i>Platform</span>
  </div>

  <!-- Main content -->
  <div class="wrap">
    <!-- Top-level tab pills -->
    <div class="plat-tabs" id="platTabs">
      <button class="plat-tab active" data-tab="streaming">
        <i class="fa-solid fa-tv"></i> Streaming
      </button>
      <button class="plat-tab" data-tab="reading">
        <i class="fa-solid fa-book-open"></i> Reading
      </button>
      <button class="plat-tab" data-tab="sources">
        <i class="fa-solid fa-link"></i> Sources
      </button>
    </div>

    <!-- ── Streaming tab ──────────────────────────────── -->
    <div id="tab-streaming">
      <div id="streamContent">
        <!-- skeleton -->
        <div class="skel-shelf">
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
        </div>
      </div>
    </div>

    <!-- ── Reading tab ────────────────────────────────── -->
    <div id="tab-reading" style="display:none;">
      <div id="readContent">
        <div class="skel-shelf">
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
          <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line" style="width:50%;margin:0 8px 8px;"></div></div>
        </div>
      </div>
    </div>

    <!-- ── Sources tab ────────────────────────────────── -->
    <div id="tab-sources" style="display:none;">
      <!-- Migration banner (hidden by default, shown if old data exists) -->
      <div id="migrateBanner" style="display:none;background:rgba(255,193,7,.08);border:1px solid rgba(255,193,7,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;align-items:center;gap:12px;flex-wrap:wrap;">
        <i class="fa-solid fa-box-archive" style="color:#ffd54f;"></i>
        <span style="font-size:11px;color:#ccc;flex:1;">You have old platform data — migrate it to the community list so it's visible to everyone.</span>
        <button id="btnMigrate" style="padding:6px 16px;border-radius:8px;border:none;background:#ffd54f;color:#000;font-family:'Bungee',sans-serif;font-size:10px;cursor:pointer;">Migrate</button>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
        <div class="src-subtabs" id="srcSubtabs" style="margin-bottom:0;">
          <button class="src-subtab active" data-src="streaming">Streaming</button>
          <button class="src-subtab" data-src="webtoon">Reading</button>
        </div>
        <button class="src-add-btn" id="btnAddSrc">
          <i class="fa-solid fa-plus"></i> Add Source
        </button>
      </div>
      <div id="srcGrid" class="src-grid">
        <div class="src-empty"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
      </div>
    </div>
  </div>

  <!-- ── Add / Edit Source Modal ──────────────────────────── -->
  <div id="srcModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:300; align-items:center; justify-content:center;">
    <div style="background:#111; border:1px solid #2a2a2a; border-radius:16px; padding:28px 28px 24px; width:min(440px,90vw); position:relative;">
      <div style="font-size:15px; margin-bottom:20px;" id="srcModalTitle">Add Source</div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="font-size:10px;color:#666;display:block;margin-bottom:5px;">NAME</label>
          <input id="srcName" placeholder="e.g. Crunchyroll" style="width:100%;box-sizing:border-box;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;padding:9px 12px;color:#fff;font-family:'Bungee',sans-serif;font-size:11px;outline:none;" />
        </div>
        <div>
          <label style="font-size:10px;color:#666;display:block;margin-bottom:5px;">URL</label>
          <input id="srcUrl" placeholder="https://crunchyroll.com" style="width:100%;box-sizing:border-box;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;padding:9px 12px;color:#fff;font-family:'Bungee',sans-serif;font-size:11px;outline:none;" />
        </div>
        <div>
          <label style="font-size:10px;color:#666;display:block;margin-bottom:8px;">TYPE</label>
          <div style="display:flex;gap:8px;">
            <label style="display:flex;align-items:center;gap:6px;font-size:10px;cursor:pointer;">
              <input type="radio" name="srcType" value="streaming" checked /> Streaming
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:10px;cursor:pointer;">
              <input type="radio" name="srcType" value="webtoon" /> Reading
            </label>
          </div>
        </div>
        <div>
          <label style="font-size:10px;color:#666;display:block;margin-bottom:8px;">TAGS</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px;" id="srcTagsWrap">
            <label style="font-size:10px;cursor:pointer;"><input type="checkbox" value="Free" /> Free</label>
            <label style="font-size:10px;cursor:pointer;"><input type="checkbox" value="Premium" /> Premium</label>
            <label style="font-size:10px;cursor:pointer;"><input type="checkbox" value="Sub" /> Sub</label>
            <label style="font-size:10px;cursor:pointer;"><input type="checkbox" value="Dub" /> Dub</label>
            <label style="font-size:10px;cursor:pointer;"><input type="checkbox" value="Official" /> Official</label>
            <label style="font-size:10px;cursor:pointer;"><input type="checkbox" value="Fan-TL" /> Fan-TL</label>
          </div>
        </div>
        <div id="srcModalErr" style="font-size:10px;color:#f44336;display:none;"></div>
      </div>

      <div style="display:flex;gap:10px;margin-top:22px;">
        <button id="srcModalSave" style="flex:1;padding:9px;border-radius:8px;border:none;background:#cc0000;color:#fff;font-family:'Bungee',sans-serif;font-size:11px;cursor:pointer;">Save</button>
        <button id="srcModalCancel" style="padding:9px 18px;border-radius:8px;border:1px solid #333;background:transparent;color:#888;font-family:'Bungee',sans-serif;font-size:11px;cursor:pointer;">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      getWishlist,
      getCommunityPlatforms, addCommunityPlatform, updateCommunityPlatform,
      deleteCommunityPlatform, recordCommunityVisit, getCurrentUid,
      migrateUserPlatformsToCommunity
    } from './js/firebase-service.js';

    let currentUid = null;
    getCurrentUid().then(uid => { currentUid = uid; }).catch(() => {});

    const STREAMING_TYPES = ['anime','movie','tv-show'];
    const READING_TYPES   = ['manga','manhwa','manhua','novel'];

    const STATUS_GROUPS = [
      { key:'watching',  label:'Continue Watching',  icon:'fa-play'          },
      { key:'reading',   label:'Currently Reading',  icon:'fa-book-open'     },
      { key:'planning',  label:'Plan to Watch',      icon:'fa-clock'         },
      { key:'on_hold',   label:'On Hold',            icon:'fa-pause'         },
      { key:'completed', label:'Completed',          icon:'fa-check'         },
      { key:'dropped',   label:'Dropped',            icon:'fa-xmark'         },
    ];

    // ── Tab switching ────────────────────────────────────
    const platTabs = document.querySelectorAll('.plat-tab');
    platTabs.forEach(btn => {
      btn.addEventListener('click', () => {
        platTabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('tab-streaming').style.display = tab === 'streaming' ? '' : 'none';
        document.getElementById('tab-reading').style.display   = tab === 'reading'   ? '' : 'none';
        document.getElementById('tab-sources').style.display   = tab === 'sources'   ? '' : 'none';
        if (tab === 'sources' && !srcLoaded) { loadSources('streaming'); checkMigrationNeeded(); }
      });
    });

    // ── Source sub-tab switching ─────────────────────────
    document.querySelectorAll('.src-subtab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.src-subtab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadSources(btn.dataset.src);
      });
    });

    // ── Cover fallback helper ────────────────────────────
    function coverImg(src, alt) {
      const img = document.createElement('img');
      img.src = src || '';
      img.alt = alt;
      img.loading = 'lazy';
      img.onerror = () => {
        img.style.background = '#111';
        img.style.display = 'block';
        img.removeAttribute('src');
      };
      return img;
    }

    // ── Progress label ───────────────────────────────────
    function progLabel(item) {
      if (item.progress_current == null && item.progress_total == null) return '';
      const isAnime = STREAMING_TYPES.includes(item.type);
      const unit = isAnime ? 'Ep' : 'Ch';
      const cur  = item.progress_current ?? '?';
      const tot  = item.progress_total   ? `/${item.progress_total}` : '';
      return `${unit} ${cur}${tot}`;
    }

    // ── Progress bar percentage helper ───────────────────
    function progressPct(item) {
      const cur = item.progress_current || 0;
      const tot = item.progress_total  || 0;
      if (!tot || !cur) return 0;
      return Math.min(100, Math.round((cur / tot) * 100));
    }

    // ── Build shelf card ─────────────────────────────────
    function makeCard(item, isStream) {
      const card = document.createElement('div');
      card.className = 'shelf-card';

      const img = coverImg(item.cover_path, item.title);
      card.appendChild(img);

      const body = document.createElement('div');
      body.className = 'shelf-card-body';

      const titleEl = document.createElement('div');
      titleEl.className = 'shelf-card-title';
      titleEl.textContent = item.title || 'Untitled';
      body.appendChild(titleEl);

      const prog = progLabel(item);
      if (prog) {
        const progEl = document.createElement('div');
        progEl.className = 'shelf-card-prog';
        progEl.textContent = prog;
        body.appendChild(progEl);
      }

      // Progress bar
      const pct = progressPct(item);
      if (pct > 0) {
        const bar = document.createElement('div');
        bar.className = 'shelf-card-bar';
        bar.innerHTML = `<div class="shelf-card-bar-fill" style="width:${pct}%"></div>`;
        body.appendChild(bar);
      }

      if (isStream) {
        const btn = document.createElement('button');
        btn.className = 'shelf-watch-btn';
        btn.innerHTML = '<i class="fa-solid fa-play"></i> Watch';
        btn.addEventListener('click', e => {
          e.stopPropagation();
          location.href = `watch.html?id=${item.id}`;
        });
        body.appendChild(btn);
      } else {
        const btn = document.createElement('button');
        btn.className = 'shelf-read-btn';
        btn.innerHTML = '<i class="fa-solid fa-book-open"></i> Read';
        btn.addEventListener('click', e => {
          e.stopPropagation();
          location.href = `read.html?id=${item.id}`;
        });
        body.appendChild(btn);
      }

      card.appendChild(body);
      card.addEventListener('click', () => location.href = `detail.html?id=${item.id}`);
      return card;
    }

    // ── Build hero card (Continue Watching / Currently Reading) ──
    function makeHeroCard(item, isStream) {
      const card = document.createElement('div');
      card.className = 'hero-card';

      const img = coverImg(item.cover_path, item.title);
      card.appendChild(img);

      const body = document.createElement('div');
      body.className = 'hero-card-body';

      const titleEl = document.createElement('div');
      titleEl.className = 'hero-card-title';
      titleEl.textContent = item.title || 'Untitled';
      body.appendChild(titleEl);

      const nextNum = (item.progress_current || 0) + 1;
      const unit    = isStream ? 'Ep' : 'Ch';
      const sub     = document.createElement('div');
      sub.className = 'hero-card-sub';
      sub.textContent = item.progress_current
        ? `Up next: ${unit} ${nextNum}`
        : `Start ${unit} 1`;
      body.appendChild(sub);

      // Progress bar
      const pct = progressPct(item);
      if (pct > 0) {
        const bar = document.createElement('div');
        bar.className = 'hero-card-bar';
        bar.innerHTML = `<div class="hero-card-bar-fill" style="width:${pct}%"></div>`;
        body.appendChild(bar);
      }

      const btn = document.createElement('button');
      btn.className = isStream ? 'hero-card-btn' : 'hero-card-btn read';
      btn.innerHTML = isStream
        ? '<i class="fa-solid fa-play"></i> Continue'
        : '<i class="fa-solid fa-book-open"></i> Continue';
      btn.addEventListener('click', e => {
        e.stopPropagation();
        location.href = isStream ? `watch.html?id=${item.id}` : `read.html?id=${item.id}`;
      });
      body.appendChild(btn);

      card.appendChild(body);
      card.addEventListener('click', () => location.href = `detail.html?id=${item.id}`);
      return card;
    }

    // ── Render shelf rows ────────────────────────────────
    function renderShelf(containerId, items, isStream) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      // Hero status key (Continue Watching / Currently Reading)
      const heroKey = isStream ? 'watching' : 'reading';

      const groups = STATUS_GROUPS.filter(g =>
        isStream
          ? ['watching','planning','on_hold','completed','dropped'].includes(g.key)
          : ['reading','planning','on_hold','completed','dropped'].includes(g.key)
      );

      let anyContent = false;
      groups.forEach(g => {
        const subset = items.filter(i => i.status === g.key);
        if (!subset.length) return;
        anyContent = true;

        const isHero = g.key === heroKey;

        const section = document.createElement('div');
        section.className = isHero ? 'hero-section' : 'shelf-section';

        const label = document.createElement('div');
        label.className = isHero ? 'hero-label' : 'shelf-label';
        label.innerHTML = `<i class="fa-solid ${g.icon}"></i> ${g.label} <span style="color:#333;font-size:10px;">(${subset.length})</span>`;
        section.appendChild(label);

        const row = document.createElement('div');
        row.className = isHero ? 'hero-row' : 'shelf-row';
        subset.forEach(item => row.appendChild(
          isHero ? makeHeroCard(item, isStream) : makeCard(item, isStream)
        ));
        section.appendChild(row);
        container.appendChild(section);
      });

      if (!anyContent) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#333;font-size:12px;">Nothing here yet — add titles from Explore!</div>';
      }
    }

    // ── Load main wishlist ────────────────────────────────
    async function loadWishlist() {
      try {
        const items = await getWishlist();
        const streamItems = items.filter(i => STREAMING_TYPES.includes(i.type));
        const readItems   = items.filter(i => READING_TYPES.includes(i.type));
        renderShelf('streamContent', streamItems, true);
        renderShelf('readContent',   readItems,   false);
      } catch (e) {
        console.error(e);
        document.getElementById('streamContent').innerHTML = '<div style="color:#c00;font-size:12px;padding:20px;">Error loading library.</div>';
      }
    }

    // ── Source bookmarks ─────────────────────────────────
    function safeOpen(url) {
      if (!url) return;
      const full = /^https?:\/\//i.test(url) ? url : `https://${url}`;
      window.open(full, '_blank', 'noopener');
    }

    let srcLoaded = false;
    const TAG_COLORS = {
      Free:     { bg:'rgba(76,175,80,.15)',  border:'rgba(76,175,80,.35)',  color:'#81c784' },
      Premium:  { bg:'rgba(255,193,7,.12)',  border:'rgba(255,193,7,.35)',  color:'#ffd54f' },
      Sub:      { bg:'rgba(33,150,243,.12)', border:'rgba(33,150,243,.35)', color:'#64b5f6' },
      Dub:      { bg:'rgba(156,39,176,.12)', border:'rgba(156,39,176,.35)', color:'#ce93d8' },
      Official: { bg:'rgba(255,0,0,.12)',    border:'rgba(255,0,0,.35)',    color:'#ef9a9a' },
      'Fan-TL': { bg:'rgba(255,152,0,.12)',  border:'rgba(255,152,0,.35)',  color:'#ffcc80' },
    };

    function buildRecentVisited(platforms) {
      const recent = platforms
        .filter(p => p.visit_count > 0 && p.last_visited)
        .sort((a, b) => (b.last_visited?.toMillis?.() ?? 0) - (a.last_visited?.toMillis?.() ?? 0))
        .slice(0, 5);
      if (!recent.length) return null;

      const wrap = document.createElement('div');
      wrap.className = 'recent-visited';
      const lbl = document.createElement('div');
      lbl.className = 'recent-visited-label';
      lbl.textContent = 'Recently Visited';
      wrap.appendChild(lbl);
      const row = document.createElement('div');
      row.className = 'recent-row';

      recent.forEach(p => {
        const chip = document.createElement('div');
        chip.className = 'recent-chip';
        const ico = document.createElement('img');
        ico.src = p.icon_path || '';
        ico.alt = p.name;
        ico.onerror = () => { ico.style.display='none'; };
        chip.appendChild(ico);
        const info = document.createElement('div');
        const nameEl = document.createElement('div'); nameEl.className = 'recent-chip-name'; nameEl.textContent = p.name;
        const countEl = document.createElement('div'); countEl.className = 'recent-chip-count'; countEl.textContent = `${p.visit_count} visit${p.visit_count !== 1 ? 's' : ''}`;
        info.appendChild(nameEl); info.appendChild(countEl);
        chip.appendChild(info);
        chip.addEventListener('click', () => { recordCommunityVisit(p.id).catch(() => {}); safeOpen(p.url); });
        row.appendChild(chip);
      });

      wrap.appendChild(row);
      return wrap;
    }

    function buildSrcCard(p) {
      const card = document.createElement('div');
      card.className = 'src-card';

      const icon = document.createElement('img');
      icon.className = 'src-icon';
      icon.src = p.icon_path || '';
      icon.alt = p.name;
      icon.onerror = () => { icon.style.display='none'; };
      card.appendChild(icon);

      const name = document.createElement('div');
      name.className = 'src-name';
      name.textContent = p.name;
      card.appendChild(name);

      if (p.visit_count > 0) {
        const vc = document.createElement('div');
        vc.style.cssText = 'font-size:9px;color:#444;margin-top:2px;';
        vc.textContent = `${p.visit_count} visit${p.visit_count !== 1 ? 's' : ''}`;
        card.appendChild(vc);
      }

      if (p.tags?.length) {
        const tagsEl = document.createElement('div');
        tagsEl.className = 'src-tags';
        p.tags.forEach(t => {
          const c = TAG_COLORS[t] || { bg:'#1a1a1a', border:'#333', color:'#888' };
          const tag = document.createElement('span');
          tag.className = 'src-tag';
          tag.textContent = t;
          tag.style.background = c.bg;
          tag.style.borderColor = c.border;
          tag.style.color = c.color;
          tagsEl.appendChild(tag);
        });
        card.appendChild(tagsEl);
      }

      const byLabel = document.createElement('div');
      byLabel.style.cssText = 'font-size:9px;color:#333;margin-top:4px;';
      byLabel.textContent = p.created_by === currentUid ? 'Added by you' : 'Community';
      card.appendChild(byLabel);

      const visitBtn = document.createElement('button');
      visitBtn.className = 'src-visit-btn';
      visitBtn.innerHTML = '<i class="fa-solid fa-arrow-up-right-from-square"></i> Visit';
      visitBtn.addEventListener('click', () => { recordCommunityVisit(p.id).catch(() => {}); safeOpen(p.url); });
      card.appendChild(visitBtn);

      if (p.created_by === currentUid) {
        const actions = document.createElement('div');
        actions.className = 'src-card-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'src-edit-btn';
        editBtn.innerHTML = '<i class="fa-solid fa-pen"></i> Edit';
        editBtn.addEventListener('click', () => openModal(p));
        actions.appendChild(editBtn);

        const delBtn = document.createElement('button');
        delBtn.className = 'src-del-btn';
        delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
        delBtn.addEventListener('click', async () => {
          if (!confirm(`Delete "${p.name}"?`)) return;
          try { await deleteCommunityPlatform(p.id); loadSources(currentSrcType); }
          catch(e) { alert(e.message); }
        });
        actions.appendChild(delBtn);
        card.appendChild(actions);
      }

      return card;
    }

    let currentSrcType = 'streaming';

    async function loadSources(type) {
      currentSrcType = type;
      srcLoaded = true;
      const grid = document.getElementById('srcGrid');
      grid.innerHTML = '<div class="src-empty"><i class="fa-solid fa-circle-notch fa-spin"></i></div>';
      try {
        const platforms = await getCommunityPlatforms(type);
        grid.innerHTML = '';

        const recentEl = buildRecentVisited(platforms);
        if (recentEl) {
          const gridParent = grid.parentNode;
          gridParent.querySelector('.recent-visited')?.remove();
          gridParent.insertBefore(recentEl, grid);
        }

        if (!platforms.length) {
          grid.innerHTML = `<div class="src-empty">No community sources yet — be the first to add one!</div>`;
          return;
        }
        platforms.forEach(p => grid.appendChild(buildSrcCard(p)));
      } catch(e) {
        console.error(e);
        grid.innerHTML = '<div class="src-empty" style="color:#c00;">Error loading sources.</div>';
      }
    }

    // ── Add / Edit Modal ─────────────────────────────────────
    const modal       = document.getElementById('srcModal');
    const modalTitle  = document.getElementById('srcModalTitle');
    const srcName     = document.getElementById('srcName');
    const srcUrlInp   = document.getElementById('srcUrl');
    const srcModalErr = document.getElementById('srcModalErr');
    let editingId     = null;

    function openModal(platform = null) {
      editingId = platform?.id || null;
      modalTitle.textContent = platform ? 'Edit Source' : 'Add Source';
      srcName.value    = platform?.name || '';
      srcUrlInp.value  = platform?.url  || '';
      const typeVal = platform?.type || currentSrcType;
      document.querySelectorAll('input[name="srcType"]').forEach(r => { r.checked = r.value === typeVal; });
      const activeTags = platform?.tags || [];
      document.querySelectorAll('#srcTagsWrap input[type="checkbox"]').forEach(cb => { cb.checked = activeTags.includes(cb.value); });
      srcModalErr.style.display = 'none';
      modal.style.display = 'flex';
      srcName.focus();
    }

    function closeModal() { modal.style.display = 'none'; editingId = null; }

    document.getElementById('btnAddSrc').addEventListener('click', () => openModal());
    document.getElementById('srcModalCancel').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('srcModalSave').addEventListener('click', async () => {
      const name = srcName.value.trim();
      const url  = srcUrlInp.value.trim();
      const type = document.querySelector('input[name="srcType"]:checked')?.value || 'streaming';
      const tags = [...document.querySelectorAll('#srcTagsWrap input[type="checkbox"]:checked')].map(c => c.value);

      srcModalErr.style.display = 'none';
      if (!name) { srcModalErr.textContent = 'Name is required.'; srcModalErr.style.display='block'; return; }
      if (!url)  { srcModalErr.textContent = 'URL is required.';  srcModalErr.style.display='block'; return; }

      const saveBtn = document.getElementById('srcModalSave');
      saveBtn.textContent = 'Saving…'; saveBtn.disabled = true;
      try {
        if (editingId) {
          await updateCommunityPlatform(editingId, { name, url, type, tags });
        } else {
          await addCommunityPlatform({ name, url, type, tags });
        }
        closeModal();
        loadSources(currentSrcType);
      } catch(e) {
        if (e.message?.startsWith('DUPLICATE:')) {
          const dupName = e.message.split(':')[1];
          srcModalErr.textContent = `"${dupName}" already exists with the same URL.`;
        } else {
          srcModalErr.textContent = e.message || 'Failed to save. Try again.';
        }
        srcModalErr.style.display = 'block';
      } finally {
        saveBtn.textContent = 'Save'; saveBtn.disabled = false;
      }
    });

    // ── Migration banner ─────────────────────────────────────
    async function checkMigrationNeeded() {
      try {
        const { getPlatforms } = await import('./js/firebase-service.js');
        const old = await getPlatforms('streaming');
        const old2 = await getPlatforms('webtoon');
        if (old.length + old2.length > 0) {
          document.getElementById('migrateBanner').style.display = 'flex';
        }
      } catch(_) {}
    }

    document.getElementById('btnMigrate').addEventListener('click', async () => {
      const btn = document.getElementById('btnMigrate');
      btn.textContent = 'Migrating…'; btn.disabled = true;
      try {
        const count = await migrateUserPlatformsToCommunity();
        document.getElementById('migrateBanner').style.display = 'none';
        loadSources(currentSrcType);
        alert(`Migrated ${count} platform${count !== 1 ? 's' : ''} to community list.`);
      } catch(e) {
        alert('Migration failed: ' + e.message);
        btn.textContent = 'Migrate'; btn.disabled = false;
      }
    });

    // Boot
    loadWishlist();
  </script>
</body>
</html>
