<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <title>Watch — E-Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root{ --bg:#000; --accent:#ff000086; --text:#fff; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }

    /* Subtitle display bar — sits directly below the player */
    .sub-display{
      background:#0a0a0a; border:1px solid #1a1a1a; border-top:none;
      border-radius:0 0 12px 12px; min-height:38px;
      display:flex; align-items:center; justify-content:center;
      padding:8px 16px; text-align:center;
    }
    .sub-display span{
      font-size:15px; color:#fff; line-height:1.6;
      font-family:Arial,sans-serif; font-weight:600;
      text-shadow:0 1px 4px rgba(0,0,0,.9);
      white-space:pre-wrap;
    }

    /* Subtitle control bar */
    .sub-bar{
      background:#0d0d0d; border:1px solid #1a1a1a; border-radius:10px;
      padding:10px 14px; margin-top:10px; font-size:11px;
    }
    .sub-bar-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
    .sub-bar-row:last-child{ margin-bottom:0; }
    .sub-label{ font-size:10px; color:#555; white-space:nowrap; }
    .sub-lang-btn{
      padding:4px 12px; border-radius:7px; border:1px solid #2a2a2a;
      background:#1a1a1a; color:#777; font-family:"Bungee",Arial,sans-serif;
      font-size:10px; cursor:pointer; transition:all .15s;
    }
    .sub-lang-btn:hover{ color:#fff; border-color:#555; }
    .sub-lang-btn.active{ background:rgba(255,0,0,.12); border-color:rgba(255,0,0,.35); color:#ff9999; }
    .sub-ctrl-btn{
      padding:4px 10px; border-radius:7px; border:1px solid #2a2a2a;
      background:#111; color:#888; font-family:"Bungee",Arial,sans-serif;
      font-size:9px; cursor:pointer; transition:all .15s;
    }
    .sub-ctrl-btn:hover{ color:#fff; border-color:#555; }
    .sub-ctrl-btn.go{ background:rgba(0,180,0,.1); border-color:rgba(0,180,0,.3); color:#6f6; }
    .sub-ctrl-btn.go:hover{ background:rgba(0,180,0,.2); }
    .sub-status{ font-size:10px; color:#555; }
    .sub-status.ok{ color:#4caf50; }
    .sub-status.err{ color:#f44; }

    /* Dub/Sub toggle */
    .dub-toggle{
      display:inline-flex; border:1px solid #2a2a2a; border-radius:8px;
      overflow:hidden; margin-left:4px;
    }
    .dub-btn{
      padding:4px 12px; border:none; background:#1a1a1a; color:#666;
      font-family:"Bungee",Arial,sans-serif; font-size:10px; cursor:pointer;
      transition:all .15s;
    }
    .dub-btn.active{ background:rgba(255,0,0,.15); color:#fff; }
  </style>
</head>
<body>
  <script type="module" src="js/auth-guard.js"></script>

  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <div class="watch-wrap" id="watchWrap">
    <!-- Loading state -->
    <div id="loadingState" style="text-align:center;padding:60px 0;color:#444;font-size:13px;">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size:28px;color:#333;margin-bottom:12px;display:block;"></i>
      Loading...
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="mainContent" style="display:none;">
      <a class="watch-back" href="platform.html">
        <i class="fa-solid fa-arrow-left"></i> Back to Platform
      </a>

      <div class="watch-title" id="watchTitle"></div>
      <div class="watch-meta" id="watchMeta"></div>

      <!-- Player -->
      <div class="watch-player" id="watchPlayer">
        <div class="watch-player-msg" id="playerMsg">
          <i class="fa-solid fa-film"></i>
          <div id="playerMsgText">Looking up video source…</div>
        </div>
      </div>

      <!-- Subtitle display (below player) -->
      <div class="sub-display" id="subDisplay" style="display:none">
        <span id="subText"></span>
      </div>

      <!-- Server bar -->
      <div class="watch-server-bar" id="serverBar">
        <div class="watch-server-msg" id="serverMsg">
          If current server doesn't work, try another server.
        </div>
        <div class="watch-server-btns">
          <span class="watch-server-label">SERVER:</span>
          <button class="watch-srv-btn active" id="srv1"  onclick="switchServer(1)">Server 1</button>
          <button class="watch-srv-btn"        id="srv2"  onclick="switchServer(2)">Server 2</button>
          <button class="watch-srv-btn"        id="srv3"  onclick="switchServer(3)">Server 3</button>
          <button class="watch-srv-btn"        id="srv4"  onclick="switchServer(4)" style="display:none"><i class="fa-solid fa-dragon"></i> Anime</button>
          <div class="dub-toggle" id="dubToggle" style="display:none">
            <button class="dub-btn active" id="btnSub" onclick="setDub(false)">SUB</button>
            <button class="dub-btn"        id="btnDub" onclick="setDub(true)">DUB</button>
          </div>
          <button class="watch-srv-btn"        id="srvYT" onclick="tryYouTube()"><i class="fa-brands fa-youtube"></i> Trailer</button>
        </div>
      </div>

      <!-- Subtitle bar -->
      <div class="sub-bar" id="subBar" style="display:none">
        <div class="sub-bar-row">
          <span class="sub-label">SUBTITLES:</span>
          <button class="sub-lang-btn" onclick="searchSubs('en')">EN</button>
          <button class="sub-lang-btn" onclick="searchSubs('id')">ID</button>
          <button class="sub-lang-btn" onclick="searchSubs('ar')">AR</button>
          <button class="sub-lang-btn" onclick="searchSubs('fr')">FR</button>
          <button class="sub-lang-btn" onclick="searchSubs('es')">ES</button>
          <span class="sub-status" id="subStatus">Pick a language to load subtitles.</span>
        </div>
        <div class="sub-bar-row" id="subFileRow" style="display:none">
          <span class="sub-label">FILE:</span>
          <div id="subFileList" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>
        <div class="sub-bar-row" id="subTimerRow" style="display:none">
          <span class="sub-label">SYNC:</span>
          <button class="sub-ctrl-btn go" id="btnSubStart" onclick="toggleSubSync()"><i class="fa-solid fa-play"></i> Start</button>
          <button class="sub-ctrl-btn" onclick="adjustSub(-5)">-5s</button>
          <button class="sub-ctrl-btn" onclick="adjustSub(-0.5)">-0.5s</button>
          <button class="sub-ctrl-btn" onclick="adjustSub(0.5)">+0.5s</button>
          <button class="sub-ctrl-btn" onclick="adjustSub(5)">+5s</button>
          <button class="sub-ctrl-btn" onclick="resetSubSync()"><i class="fa-solid fa-rotate-left"></i> Reset</button>
        </div>
      </div>

      <!-- Controls -->
      <div class="watch-controls" id="watchControls" style="margin-top:12px;flex-wrap:wrap;gap:8px;display:flex;align-items:center;">
        <button class="watch-ctrl-btn primary" id="btnMark" onclick="markWatched()">
          <i class="fa-solid fa-check"></i> <span id="btnMarkLabel">Mark Watched</span>
        </button>
      </div>

      <!-- Episode grid -->
      <div class="ep-section" id="epSection" style="display:none;">
        <div class="ep-section-title">Episodes</div>
        <div class="ep-page-btns" id="epPageBtns"></div>
        <div class="ep-grid" id="epGrid"></div>
        <div class="ep-nav" id="epNav">
          <button class="ep-nav-btn" id="btnPrev" onclick="goPrevEp()"><i class="fa-solid fa-chevron-left"></i> Prev</button>
          <button class="ep-nav-btn all" onclick="scrollToEpGrid()"><i class="fa-solid fa-list"></i> All Episodes</button>
          <button class="ep-nav-btn" id="btnNext" onclick="goNextEp()">Next <i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>

      <!-- Seasons section -->
      <div class="seasons-section" id="seasonsSection" style="display:none;">
        <div class="ep-section-title" style="margin-top:28px;">Seasons</div>
        <div class="seasons-grid" id="seasonsGrid"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { getWishlistItem, updateWishlistItem, logActivity } from './js/firebase-service.js';

    const q      = new URLSearchParams(location.search);
    const itemId = q.get('id') || '';

    const TMDB_BASE  = '/api/tmdb';
    const JIKAN_BASE = 'https://api.jikan.moe/v4';
    const PAGE_SIZE  = 50;


    let item       = null;  // wishlist doc
    let tmdbId     = null;
    let malId      = null;  // for megaplay anime server
    let isDub      = false; // sub/dub toggle for anime server
    let curEp      = 1;
    let curSeason  = 1;
    let totalEps   = 0;

    // Subtitle state
    let subCues      = [];   // [{start, end, text}]
    let subInterval  = null;
    let subRunning   = false;
    let subStartEpoch= null;
    let subOffset    = 0;    // manual timing adjustment in seconds

    // ── Season parser ─────────────────────────────────────
    function parseSeasonFromTitle(title) {
      if (!title) return 1;
      const t = title.toLowerCase();
      // "2nd Season", "3rd Season", "4th Season" …
      const ordinal = t.match(/(\d+)(?:st|nd|rd|th)\s+season/);
      if (ordinal) return parseInt(ordinal[1]);
      // "Season 2"
      const plain = t.match(/season\s+(\d+)/);
      if (plain) return parseInt(plain[1]);
      // "Part 2", "Part II"
      const part = t.match(/part\s+(\d+|ii|iii|iv)/);
      if (part) {
        const roman = { ii:2, iii:3, iv:4 };
        return roman[part[1]] ?? parseInt(part[1]) ?? 1;
      }
      // "S2", "S3"
      const shortS = t.match(/\bs(\d+)\b/);
      if (shortS) return parseInt(shortS[1]);
      return 1;
    }
    let epPage     = 0;  // current page index (0-based)
    let srcMode    = 'primary';  // 'primary' | 'alt' | 'yt'
    let iframeEl   = null;
    let loadTimeout = null;

    async function init() {
      if (!itemId) { showError('No item ID supplied.'); return; }
      try {
        item = await getWishlistItem(itemId);
      } catch(e) {
        showError('Could not load this title.'); return;
      }

      // Populate header
      document.getElementById('watchTitle').textContent = item.title || 'Untitled';
      const typeLabel = item.type ? item.type.charAt(0).toUpperCase() + item.type.slice(1) : '';
      document.getElementById('watchMeta').textContent = typeLabel + (item.genre ? ` · ${item.genre}` : '');

      // Determine starting episode (current progress + 1, min 1)
      curEp     = Math.max(1, (item.progress_current || 0) + 1);
      if (item.status === 'completed' || item.progress_current === item.progress_total) curEp = 1;
      totalEps  = item.progress_total || 0;
      curSeason = parseSeasonFromTitle(item.title); // detect from title e.g. "2nd Season"

      updateMarkBtn();

      const isMovie = item.type === 'movie';

      // Show episode grid if we know total
      if (totalEps > 0 && !isMovie) {
        buildEpGrid();
      }

      // Show main content
      document.getElementById('loadingState').style.display  = 'none';
      document.getElementById('mainContent').style.display   = '';
      updateServerMsg();
      updatePrevNextBtns();

      // Lookup TMDB ID then load player
      setPlayerMsg('<i class="fa-solid fa-circle-notch fa-spin"></i>', 'Looking up video source…');
      try {
        tmdbId = await getTmdbId(item.title, item.type);
      } catch(_) { tmdbId = null; }

      if (tmdbId) {
        loadEmbed('primary');
        if (!isMovie) {
          fetchTmdbSeasons(tmdbId);
          if (totalEps === 0) fetchTmdbEpisodeCount(tmdbId, curSeason);
        }
      } else {
        setPlayerMsg('<i class="fa-solid fa-triangle-exclamation"></i>', 'Could not find this title in the video database. Try YouTube Trailer below.');
      }

      // Show subtitle bar for all types
      document.getElementById('subBar').style.display = '';

      // Fetch MAL ID for anime — enables Anime server (megaplay)
      if (item.type === 'anime') {
        getMalId(item.title).then(id => {
          malId = id;
          if (id) document.getElementById('srv4').style.display = '';
        });
      }
    }

    // ── Fetch episode count from TMDB ────────────────────
    async function fetchTmdbEpisodeCount(id, season) {
      try {
        const res  = await fetch(`${TMDB_BASE}?path=tv/${id}/season/${season}`);
        if (!res.ok) return;
        const data = await res.json();
        const count = data.episodes?.length || 0;
        if (count > 0) {
          totalEps = count;
          updatePrevNextBtns();
          buildEpGrid();
        }
      } catch(_) {}
    }

    // ── Strip season/part suffixes for cleaner TMDB search ──
    function cleanTitleForSearch(t) {
      return t
        .replace(/\s*\d+(?:st|nd|rd|th)\s+season/gi, '') // "2nd Season"
        .replace(/\s*season\s+\d+/gi, '')                 // "Season 3"
        .replace(/\s*part\s+(?:\d+|ii|iii|iv)/gi, '')    // "Part 2", "Part II"
        .replace(/\s*cour\s+\d+/gi, '')                   // "Cour 2"
        .replace(/\s*\bs\d+\b/gi, '')                     // "S2"
        .replace(/\s*[-–:]\s*$/, '')                      // trailing dash/colon
        .trim();
    }

    // ── TMDB ID lookup ───────────────────────────────────
    async function getTmdbId(title, type) {
      const isMovie    = type === 'movie';
      const searchPath = isMovie ? 'search/movie' : 'search/tv';
      const cleaned    = cleanTitleForSearch(title); // e.g. "Shingeki no Kyojin"

      // Helper: first result is fine for TMDB (their ranking is good)
      function firstHit(results) {
        return results?.[0] || null;
      }

      // Helper: search TMDB and return id or null
      async function tmdbSearch(q) {
        try {
          const res = await fetch(`${TMDB_BASE}?path=${searchPath}&query=${encodeURIComponent(q)}`);
          if (!res.ok) return null;
          const data = await res.json();
          return firstHit(data.results)?.id || null;
        } catch(_) { return null; }
      }

      // Helper: get Jikan canonical English title for a query string
      async function jikanTitle(q) {
        try {
          const res  = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(q)}&limit=1`);
          const data = await res.json();
          const anime = data.data?.[0];
          return anime?.title_english || anime?.title || null;
        } catch(_) { return null; }
      }

      // Try order (stops at first hit):
      // 1. Raw title on TMDB             "Shingeki no Kyojin Season 3 Part 2"
      // 2. Cleaned title on TMDB         "Shingeki no Kyojin"
      // 3. Jikan(raw) → English → TMDB  "Attack on Titan Season 3 Part 2" → TMDB
      // 4. Jikan(cleaned) → English → TMDB  "Attack on Titan" → TMDB

      let id;

      id = await tmdbSearch(title);
      if (id) return id;

      if (!isMovie && cleaned !== title) {
        id = await tmdbSearch(cleaned);
        if (id) return id;
      }

      if (!isMovie) {
        const eng = await jikanTitle(title);
        if (eng) {
          id = await tmdbSearch(eng);
          if (id) return id;

          const engCleaned = cleanTitleForSearch(eng);
          if (engCleaned !== eng) {
            id = await tmdbSearch(engCleaned);
            if (id) return id;
          }
        }

        // Last resort: Jikan with the already-cleaned base title
        if (cleaned !== title) {
          const eng2 = await jikanTitle(cleaned);
          if (eng2) {
            id = await tmdbSearch(eng2);
            if (id) return id;
          }
        }
      }

      return null;
    }

    // ── Embed URL builders ───────────────────────────────
    function buildEmbedUrl(id, type, season, ep) {
      if (!id) return null;
      if (type === 'movie') return `https://vidsrc.xyz/embed/movie?tmdb=${id}`;
      return `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${season}&episode=${ep}`;
    }

    function buildAltUrl(id, type, season, ep) {
      if (!id) return null;
      if (type === 'movie') return `https://vidsrc.net/embed/movie?tmdb=${id}`;
      return `https://vidsrc.net/embed/tv?tmdb=${id}&season=${season}&episode=${ep}`;
    }

    function build2EmbedUrl(id, type, season, ep) {
      if (!id) return null;
      if (type === 'movie') return `https://www.2embed.cc/embed/${id}`;
      return `https://www.2embed.cc/embedtv/${id}&s=${season}&e=${ep}`;
    }

    function buildMegaplayUrl(mId, ep, dub) {
      if (!mId) return null;
      return `https://megaplay.buzz/stream/mal/${mId}/${ep}/${dub ? 'dub' : 'sub'}`;
    }

    async function getMalId(title) {
      try {
        const res  = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(title)}&limit=1`);
        const data = await res.json();
        return data.data?.[0]?.mal_id || null;
      } catch(_) { return null; }
    }

    // ── Load iframe ──────────────────────────────────────
    function loadEmbed(mode) {
      srcMode = mode;
      let url = null;
      if (mode === 'primary') url = buildEmbedUrl(tmdbId, item.type, curSeason, curEp);
      if (mode === 'alt')     url = buildAltUrl(tmdbId, item.type, curSeason, curEp);
      if (mode === 'alt2')    url = build2EmbedUrl(tmdbId, item.type, curSeason, curEp);
      if (mode === 'anime')   url = buildMegaplayUrl(malId, curEp, isDub);

      if (!url) {
        setPlayerMsg('<i class="fa-solid fa-triangle-exclamation"></i>', 'No video source available for this title.');
        return;
      }

      // Remove old iframe
      if (iframeEl) iframeEl.remove();
      clearTimeout(loadTimeout);
      document.getElementById('playerMsg').style.display = 'none';

      iframeEl = document.createElement('iframe');
      iframeEl.src = url;
      iframeEl.allowFullscreen = true;
      iframeEl.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture';
      iframeEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';

      // Fallback: if iframe doesn't load in 12s, show message
      loadTimeout = setTimeout(() => {
        if (iframeEl && iframeEl.parentNode) {
          showFallbackHint();
        }
      }, 12000);

      iframeEl.addEventListener('load', () => clearTimeout(loadTimeout));
      document.getElementById('watchPlayer').appendChild(iframeEl);

      // Update episode grid highlighting
      if (totalEps > 0 && item.type !== 'movie') refreshEpGrid();
    }

    // ── YouTube Trailer ──────────────────────────────────
    window.tryYouTube = async function() {
      srcMode = 'yt';
      setPlayerMsg('<i class="fa-solid fa-circle-notch fa-spin"></i>', 'Searching for trailer…');
      if (iframeEl) { iframeEl.remove(); iframeEl = null; }

      let ytId = null;
      try {
        // Try Jikan for anime
        const res  = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(item.title)}&limit=1`);
        const data = await res.json();
        ytId = data.data?.[0]?.trailer?.youtube_id || null;
      } catch(_) {}

      if (!ytId) {
        // Try TMDB videos
        if (tmdbId) {
          try {
            const mediaType = item.type === 'movie' ? 'movie' : 'tv';
            const res  = await fetch(`${TMDB_BASE}?path=${mediaType}/${tmdbId}/videos`);
            const data = await res.json();
            const yt   = data.results?.find(v => v.site === 'YouTube' && v.type === 'Trailer');
            ytId = yt?.key || null;
          } catch(_) {}
        }
      }

      if (!ytId) {
        setPlayerMsg('<i class="fa-brands fa-youtube"></i>', 'No trailer found for this title.');
        return;
      }

      if (iframeEl) iframeEl.remove();
      document.getElementById('playerMsg').style.display = 'none';
      iframeEl = document.createElement('iframe');
      iframeEl.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
      iframeEl.allowFullscreen = true;
      iframeEl.allow = 'autoplay; encrypted-media; fullscreen';
      iframeEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
      document.getElementById('watchPlayer').appendChild(iframeEl);
    };

    // ── Server switcher ──────────────────────────────────
    window.switchServer = function(num) {
      if (num !== 4 && !tmdbId) { showFallbackHint(); return; }
      if (num === 4 && !malId)  { showFallbackHint(); return; }
      document.querySelectorAll('.watch-srv-btn').forEach(b => b.classList.remove('active'));
      const dubToggle = document.getElementById('dubToggle');
      dubToggle.style.display = num === 4 ? 'inline-flex' : 'none';
      if (num === 1) { document.getElementById('srv1').classList.add('active'); loadEmbed('primary'); }
      if (num === 2) { document.getElementById('srv2').classList.add('active'); loadEmbed('alt'); }
      if (num === 3) { document.getElementById('srv3').classList.add('active'); loadEmbed('alt2'); }
      if (num === 4) { document.getElementById('srv4').classList.add('active'); loadEmbed('anime'); }
    };

    // Sub/Dub toggle for megaplay anime server
    window.setDub = function(dub) {
      isDub = dub;
      document.getElementById('btnSub').classList.toggle('active', !dub);
      document.getElementById('btnDub').classList.toggle('active',  dub);
      if (srcMode === 'anime') loadEmbed('anime');
    };

    // ── Mark watched ─────────────────────────────────────
    window.markWatched = async function() {
      if (!item) return;
      const isMovie = item.type === 'movie';
      const newProg = isMovie ? (item.progress_total || 1) : curEp;
      try {
        await updateWishlistItem(itemId, { progress_current: newProg });
        logActivity('progress', { itemId, itemTitle: item.title, itemType: item.type, coverPath: item.cover_path }).catch(() => {});
        item.progress_current = newProg;

        if (!isMovie) {
          curEp = Math.min(curEp + 1, totalEps || curEp + 1);
          updateMarkBtn();
          updateServerMsg();
          updatePrevNextBtns();
          if (tmdbId || malId) loadEmbed(['primary','alt','alt2','anime'].includes(srcMode) ? srcMode : 'primary');
          if (totalEps > 0) refreshEpGrid();
        } else {
          document.getElementById('btnMark').innerHTML = '<i class="fa-solid fa-check-double"></i> Marked!';
          document.getElementById('btnMark').disabled = true;
        }
      } catch(e) {
        console.error(e);
      }
    };

    function updateMarkBtn() {
      const isMovie = item.type === 'movie';
      const lbl = document.getElementById('btnMarkLabel');
      if (isMovie) {
        lbl.textContent = 'Mark Watched';
      } else {
        lbl.textContent = `Mark Ep ${curEp} Watched`;
      }
    }

    function updateServerMsg() {
      const isMovie = item.type === 'movie';
      const msg = document.getElementById('serverMsg');
      if (msg) {
        msg.innerHTML = isMovie
          ? `You are watching <span>${item.title || 'this title'}</span>. If current server doesn't work, try another below.`
          : `You are watching <span>Episode ${curEp}</span>. If current server doesn't work, try another below.`;
      }
    }

    // ── Prev / Next episode ───────────────────────────────
    window.goPrevEp = function() {
      if (curEp <= 1) return;
      curEp--;
      updateMarkBtn();
      updateServerMsg();
      updatePrevNextBtns();
      if (tmdbId && srcMode !== 'yt') loadEmbed(srcMode);
      if (totalEps > 0) {
        // Switch page if needed
        const pageIdx = Math.floor((curEp - 1) / PAGE_SIZE);
        if (pageIdx !== epPage) {
          epPage = pageIdx;
          document.querySelectorAll('.ep-page-btn').forEach((b, i) => b.classList.toggle('active', i === pageIdx));
        }
        refreshEpGrid();
      }
    };

    window.goNextEp = function() {
      const maxEp = totalEps || curEp;
      if (curEp >= maxEp) return;
      curEp++;
      updateMarkBtn();
      updateServerMsg();
      updatePrevNextBtns();
      if (tmdbId && srcMode !== 'yt') loadEmbed(srcMode);
      if (totalEps > 0) {
        const pageIdx = Math.floor((curEp - 1) / PAGE_SIZE);
        if (pageIdx !== epPage) {
          epPage = pageIdx;
          document.querySelectorAll('.ep-page-btn').forEach((b, i) => b.classList.toggle('active', i === pageIdx));
        }
        refreshEpGrid();
      }
    };

    window.scrollToEpGrid = function() {
      document.getElementById('epSection')?.scrollIntoView({ behavior:'smooth', block:'start' });
    };

    function updatePrevNextBtns() {
      const maxEp = totalEps || curEp;
      const prev = document.getElementById('btnPrev');
      const next = document.getElementById('btnNext');
      if (prev) prev.disabled = curEp <= 1;
      if (next) next.disabled = curEp >= maxEp;
    }

    // ── Season cards ──────────────────────────────────────
    async function fetchTmdbSeasons(id) {
      try {
        const res  = await fetch(`${TMDB_BASE}?path=tv/${id}`);
        if (!res.ok) return;
        const data = await res.json();
        let num    = data.number_of_seasons || 1;

        // TMDB often reports 1 season for anime even when season 2 exists.
        // Use title hint (e.g. "2nd Season") and probe Season 2 as fallback checks.
        const titleSeason = parseSeasonFromTitle(item.title);
        num = Math.max(num, titleSeason);

        if (num <= 1) {
          // Last resort: probe Season 2 directly
          try {
            const s2res = await fetch(`${TMDB_BASE}?path=tv/${id}/season/2`);
            if (s2res.ok) {
              const s2data = await s2res.json();
              if (s2data.episodes?.length > 0) num = 2;
            }
          } catch(_) {}
        }

        if (num <= 1) return; // truly single-season — don't show the section
        buildSeasonCards(id, num);
      } catch(_) {}
    }

    async function buildSeasonCards(id, numSeasons) {
      const section = document.getElementById('seasonsSection');
      const grid    = document.getElementById('seasonsGrid');
      section.style.display = '';
      grid.innerHTML = '';

      for (let i = 1; i <= numSeasons; i++) {
        const card = document.createElement('div');
        card.className = 'season-card' + (i === curSeason ? ' active' : '');
        card.dataset.season = i;
        card.innerHTML = `
          <div class="season-card-num">${i}</div>
          <div class="season-card-label">SEASON</div>
          <div class="season-card-eps" id="s-eps-${i}">…</div>
        `;
        card.addEventListener('click', () => switchSeason(i));
        grid.appendChild(card);

        // Fetch ep count per season in background
        fetch(`${TMDB_BASE}?path=tv/${id}/season/${i}`)
          .then(r => r.json())
          .then(d => {
            const epCount = d.episodes?.length || 0;
            const el = document.getElementById(`s-eps-${i}`);
            if (el) el.textContent = epCount ? `${epCount} eps` : '';
          }).catch(() => {});
      }
    }

    function switchSeason(num) {
      curSeason = num;
      curEp     = 1;
      totalEps  = 0;
      updateMarkBtn();
      updateServerMsg();
      updatePrevNextBtns();

      // Update active card highlight
      document.querySelectorAll('.season-card').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.season) === num);
      });

      // Update episode grid for new season
      document.getElementById('epSection').style.display = 'none';
      if (tmdbId && srcMode !== 'yt') loadEmbed(srcMode);
      if (tmdbId) fetchTmdbEpisodeCount(tmdbId, curSeason);
    }

    // ── Episode grid ─────────────────────────────────────
    function buildEpGrid() {
      const sec = document.getElementById('epSection');
      sec.style.display = '';
      buildEpPageBtns();
      renderEpPage(0);
    }

    function buildEpPageBtns() {
      const container = document.getElementById('epPageBtns');
      container.innerHTML = '';
      const pages = Math.ceil(totalEps / PAGE_SIZE);
      if (pages <= 1) return;
      for (let i = 0; i < pages; i++) {
        const btn = document.createElement('button');
        btn.className = 'ep-page-btn' + (i === 0 ? ' active' : '');
        const start = i * PAGE_SIZE + 1;
        const end   = Math.min((i + 1) * PAGE_SIZE, totalEps);
        btn.textContent = `${start}–${end}`;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.ep-page-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          epPage = i;
          renderEpPage(i);
        });
        container.appendChild(btn);
      }
    }

    function renderEpPage(pageIdx) {
      epPage = pageIdx;
      const grid   = document.getElementById('epGrid');
      grid.innerHTML = '';
      const start   = pageIdx * PAGE_SIZE + 1;
      const end     = Math.min((pageIdx + 1) * PAGE_SIZE, totalEps);
      const watched = item.progress_current || 0;

      // Render descending (newest first within the page range)
      for (let ep = end; ep >= start; ep--) {
        const btn = document.createElement('button');
        btn.className = 'ep-btn' +
          (ep === curEp          ? ' current' : '') +
          (ep <= watched && ep !== curEp ? ' watched' : '');
        btn.textContent = ep;
        const epNum = ep;
        btn.addEventListener('click', () => {
          curEp = epNum;
          updateMarkBtn();
          updateServerMsg();
          updatePrevNextBtns();
          if (tmdbId && srcMode !== 'yt') loadEmbed(srcMode);
          refreshEpGrid();
        });
        grid.appendChild(btn);
      }
    }

    function refreshEpGrid() {
      // Just re-render the current page
      renderEpPage(epPage);
    }

    // ── Helpers ───────────────────────────────────────────
    function setPlayerMsg(iconHtml, text) {
      const msg = document.getElementById('playerMsg');
      msg.style.display = 'flex';
      msg.innerHTML = `<div style="font-size:28px;color:#333;">${iconHtml}</div><div id="playerMsgText">${text}</div>`;
      if (iframeEl) { iframeEl.remove(); iframeEl = null; }
    }

    function showFallbackHint() {
      setPlayerMsg(
        '<i class="fa-solid fa-triangle-exclamation" style="color:#cc6600;"></i>',
        'Video source unavailable or blocked. Try "Try Alternate Source" or "YouTube Trailer" below.'
      );
    }

    function showError(msg) {
      document.getElementById('loadingState').innerHTML =
        `<div style="color:#c00;padding:20px;font-size:12px;">${msg}</div>`;
    }

    /* ══════════════════════════════════════════════════
       SUBTITLES (SubDL)
    ══════════════════════════════════════════════════ */
    function setSubStatus(msg, cls='') {
      const el = document.getElementById('subStatus');
      el.textContent = msg;
      el.className   = 'sub-status' + (cls ? ' '+cls : '');
    }

    window.searchSubs = async function(lang) {
      // Mark active lang button
      document.querySelectorAll('.sub-lang-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.sub-lang-btn').forEach(b => {
        if (b.textContent === lang.toUpperCase()) b.classList.add('active');
      });

      setSubStatus('Searching…');
      document.getElementById('subFileRow').style.display = 'none';
      document.getElementById('subTimerRow').style.display = 'none';

      try {
        let url = `/api/subdl?action=search&lang=${lang}`;
        if (tmdbId) {
          const type = item.type === 'movie' ? 'movie' : 'tv';
          url += `&tmdb_id=${tmdbId}&type=${type}`;
          if (type === 'tv') url += `&season=${curSeason}&episode=${curEp}`;
        } else {
          url += `&title=${encodeURIComponent(item.title)}`;
        }

        const res  = await fetch(url);
        const data = await res.json();
        const subs = data.subtitles || [];
        if (!subs.length) { setSubStatus('No subtitles found for this language.', 'err'); return; }

        setSubStatus(`${subs.length} subtitle(s) found.`, 'ok');
        const listEl = document.getElementById('subFileList');
        listEl.innerHTML = '';
        subs.slice(0, 6).forEach((s, i) => {
          const btn = document.createElement('button');
          btn.className   = 'sub-ctrl-btn';
          btn.textContent = s.release_name ? s.release_name.slice(0, 30) : `File ${i+1}`;
          btn.title       = s.release_name || '';
          btn.onclick     = () => loadSubFile(s.url, btn);
          listEl.appendChild(btn);
        });
        document.getElementById('subFileRow').style.display = '';
      } catch(e) {
        setSubStatus('Search failed. Check SUBDL_KEY in Vercel env vars.', 'err');
      }
    };

    window.loadSubFile = async function(path, btn) {
      document.querySelectorAll('#subFileList .sub-ctrl-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      setSubStatus('Downloading subtitle…');
      resetSubSync();

      try {
        const res = await fetch(`/api/subdl?action=download&path=${encodeURIComponent(path)}`);
        if (!res.ok) throw new Error(res.status);
        const buffer = await res.arrayBuffer();

        const zip   = await JSZip.loadAsync(buffer);
        // Find first .srt or .ass file
        const names = Object.keys(zip.files);
        const srtName = names.find(n => n.toLowerCase().endsWith('.srt'))
                     || names.find(n => n.toLowerCase().endsWith('.ass'))
                     || names.find(n => n.toLowerCase().endsWith('.ssa'));
        if (!srtName) { setSubStatus('No SRT/ASS file found in ZIP.', 'err'); return; }

        const text = await zip.files[srtName].async('string');
        subCues = parseSRT(text);
        if (!subCues.length) { setSubStatus('Could not parse subtitle file.', 'err'); return; }

        setSubStatus(`Loaded ${subCues.length} cues. Press Start when video plays.`, 'ok');
        document.getElementById('subTimerRow').style.display = '';
        document.getElementById('subDisplay').style.display = '';
      } catch(e) {
        setSubStatus(`Download failed: ${e.message}`, 'err');
      }
    };

    // SRT parser
    function parseSRT(text) {
      const cues   = [];
      const clean  = text.replace(/\r\n/g, '\n').replace(/^\uFEFF/, ''); // strip BOM
      const blocks = clean.trim().split(/\n{2,}/);
      for (const block of blocks) {
        const lines = block.split('\n');
        const timeLine = lines.find(l => l.includes('-->'));
        if (!timeLine) continue;
        const m = timeLine.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
        if (!m) continue;
        const textLines = lines.slice(lines.indexOf(timeLine) + 1).join('\n').replace(/<[^>]+>/g, '').trim();
        if (!textLines) continue;
        cues.push({ start: srtTime(m[1]), end: srtTime(m[2]), text: textLines });
      }
      return cues;
    }
    function srtTime(t) {
      const [h, m, s] = t.replace(',', '.').split(':');
      return parseFloat(h) * 3600 + parseFloat(m) * 60 + parseFloat(s);
    }

    // Timer sync controls
    window.toggleSubSync = function() {
      if (subRunning) {
        pauseSubSync();
      } else {
        startSubSync();
      }
    };

    function startSubSync() {
      if (!subCues.length) return;
      if (!subStartEpoch) subStartEpoch = Date.now();
      subRunning = true;
      document.getElementById('btnSubStart').innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
      document.getElementById('btnSubStart').classList.add('go');
      if (subInterval) clearInterval(subInterval);
      subInterval = setInterval(tickSubtitle, 100);
    }

    function pauseSubSync() {
      subRunning = false;
      subOffset -= (Date.now() - subStartEpoch) / 1000; // save elapsed
      subStartEpoch = null;
      if (subInterval) { clearInterval(subInterval); subInterval = null; }
      document.getElementById('btnSubStart').innerHTML = '<i class="fa-solid fa-play"></i> Resume';
    }

    window.resetSubSync = function() {
      subRunning = false; subStartEpoch = null; subOffset = 0;
      if (subInterval) { clearInterval(subInterval); subInterval = null; }
      document.getElementById('subText').textContent = '';
      document.getElementById('subDisplay').style.display = subCues.length ? '' : 'none';
      document.getElementById('btnSubStart').innerHTML = '<i class="fa-solid fa-play"></i> Start';
    };

    window.adjustSub = function(delta) {
      subOffset += delta;
      // Show feedback
      setSubStatus(`Offset: ${subOffset >= 0 ? '+' : ''}${subOffset.toFixed(1)}s`, 'ok');
    };

    function tickSubtitle() {
      if (!subRunning || !subStartEpoch) return;
      const elapsed = (Date.now() - subStartEpoch) / 1000 - subOffset;
      const cue     = subCues.find(c => elapsed >= c.start && elapsed <= c.end);
      document.getElementById('subText').textContent = cue ? cue.text : '';
    }

    // Boot
    init();
  </script>
</body>
