<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My E-Library — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- animated background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="login-wrap">
    <div class="login-card" id="loginCard">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo">
          <img src="main.jpg" alt="E-Library Logo" />
        </div>
        <h1 class="login-title">My E-Library</h1>
        <p class="login-sub" id="formSubtitle">Welcome back</p>
      </div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">

        <!-- Username — only shown in register mode -->
        <div class="field-group" id="usernameGroup" style="display:none;">
          <label for="regUsername"><i class="fa-solid fa-at"></i> Username</label>
          <input type="text" id="regUsername" placeholder="3–20 chars: letters, numbers, _" maxlength="20" autocomplete="off" />
        </div>

        <div class="field-group">
          <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="Enter your email" required autocomplete="email" />
        </div>

        <div class="field-group">
          <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Confirm password — only shown in register mode -->
        <div class="field-group" id="confirmGroup" style="display:none;">
          <label for="confirmPassword"><i class="fa-solid fa-lock"></i> Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" />
          </div>
        </div>

        <div id="errMsg" class="err-msg"></div>

        <button type="submit" id="loginBtn" class="login-btn">
          <span id="btnText">Login</span>
          <i class="fa-solid fa-arrow-right-to-bracket" id="btnIcon"></i>
        </button>

        <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--text-muted, #aaa);">
          <span id="toggleMsg">Don't have an account?</span>
          <a href="#" id="toggleLink" style="color:var(--accent, #ff6b6b); text-decoration:none; font-weight:600;">
            Create one
          </a>
        </p>

      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword,
             createUserWithEmailAndPassword, onAuthStateChanged, updateProfile }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { checkUsernameAvailable, claimUsername, upsertPublicProfile }
      from "./js/firebase-service.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        sessionStorage.setItem('userEmail', user.email);
        window.location.replace('explore.html');
      }
    });

    /* ── DOM refs ── */
    const form          = document.getElementById('loginForm');
    const card          = document.getElementById('loginCard');
    const loginBtn      = document.getElementById('loginBtn');
    const btnText       = document.getElementById('btnText');
    const btnIcon       = document.getElementById('btnIcon');
    const emailInput    = document.getElementById('email');
    const pwInput       = document.getElementById('password');
    const pwToggle      = document.getElementById('pwToggle');
    const confirmInput  = document.getElementById('confirmPassword');
    const confirmGroup  = document.getElementById('confirmGroup');
    const usernameInput = document.getElementById('regUsername');
    const usernameGroup = document.getElementById('usernameGroup');
    const errMsg        = document.getElementById('errMsg');
    const formSubtitle  = document.getElementById('formSubtitle');
    const toggleLink    = document.getElementById('toggleLink');
    const toggleMsg     = document.getElementById('toggleMsg');

    let isRegisterMode = false;

    /* ── Toggle login / register ── */
    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      errMsg.textContent = '';

      if (isRegisterMode) {
        formSubtitle.textContent      = 'Create your account';
        btnText.textContent           = 'Create Account';
        btnIcon.className             = 'fa-solid fa-user-plus';
        usernameGroup.style.display   = '';
        usernameInput.required        = true;
        confirmGroup.style.display    = '';
        confirmInput.required         = true;
        toggleMsg.textContent         = 'Already have an account?';
        toggleLink.textContent        = 'Login';
      } else {
        formSubtitle.textContent      = 'Welcome back';
        btnText.textContent           = 'Login';
        btnIcon.className             = 'fa-solid fa-arrow-right-to-bracket';
        usernameGroup.style.display   = 'none';
        usernameInput.required        = false;
        confirmGroup.style.display    = 'none';
        confirmInput.required         = false;
        toggleMsg.textContent         = "Don't have an account?";
        toggleLink.textContent        = 'Create one';
      }
    });

    /* ── Password show/hide ── */
    pwToggle.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      pwToggle.querySelector('i').className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    /* ── Form submit ── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = emailInput.value.trim();
      const pass     = pwInput.value;
      const username = usernameInput.value.trim();

      if (isRegisterMode && pass !== confirmInput.value) {
        errMsg.textContent = 'Passwords do not match.';
        return;
      }

      if (isRegisterMode) {
        if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
          errMsg.textContent = 'Username must be 3–20 characters: letters, numbers, or _.';
          return;
        }
        btnText.textContent = 'Checking username...';
        loginBtn.disabled   = true;
        errMsg.textContent  = '';
        const available = await checkUsernameAvailable(username);
        if (!available) {
          errMsg.textContent  = 'That username is already taken.';
          loginBtn.disabled   = false;
          btnText.textContent = 'Create Account';
          return;
        }
      }

      loginBtn.disabled   = true;
      btnText.textContent = isRegisterMode ? 'Creating...' : 'Logging in...';
      errMsg.textContent  = '';

      try {
        if (isRegisterMode) {
          const { user } = await createUserWithEmailAndPassword(auth, email, pass);
          await updateProfile(user, { displayName: username });
          await claimUsername(username, '');
          await upsertPublicProfile({ ...user, displayName: username });
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
        // onAuthStateChanged will handle the redirect
        loginBtn.classList.add('success');
        btnText.textContent = 'Welcome!';
      } catch (err) {
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        errMsg.textContent  = friendlyError(err.code);
        loginBtn.disabled   = false;
        btnText.textContent = isRegisterMode ? 'Create Account' : 'Login';
      }
    });

    /* ── Firebase error → readable message ── */
    function friendlyError(code) {
      switch (code) {
        case 'auth/invalid-email':            return 'Invalid email address.';
        case 'auth/user-not-found':           return 'No account found with this email.';
        case 'auth/wrong-password':           return 'Incorrect password.';
        case 'auth/invalid-credential':       return 'Invalid email or password.';
        case 'auth/email-already-in-use':     return 'This email is already registered.';
        case 'auth/weak-password':            return 'Password must be at least 6 characters.';
        case 'auth/too-many-requests':        return 'Too many attempts. Try again later.';
        default:                              return 'Something went wrong. Please try again.';
      }
    }
  </script>

</body>
</html>
