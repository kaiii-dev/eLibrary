<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <title>Explore — My E-Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root{ --bg:#000; --accent:#ff000086; --card:#111; --text:#f5f5f5; --muted:#777; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }

    /* ── TABS ── */
    .tabs-bar{
      display:flex; gap:4px; padding:12px 22px; align-items:center;
      background:#050505; border-bottom:1px solid #1a1a1a;
      position:sticky; top:60px; z-index:60; overflow-x:auto;
    }
    .tab{
      display:inline-flex; align-items:center; gap:7px; padding:8px 16px;
      border-radius:10px; border:1px solid transparent; cursor:pointer;
      font-family:"Bungee",Arial,sans-serif; font-size:12px; color:#666;
      background:transparent; white-space:nowrap; transition:all .15s;
    }
    .tab:hover{ color:#ccc; background:rgba(255,255,255,0.05); }
    .tab.active{
      color:#fff; background:rgba(255,0,0,0.15);
      border-color:rgba(255,0,0,0.3);
      box-shadow:0 0 12px rgba(255,0,0,0.1);
    }
    .tab i{ font-size:12px; }

    /* ── TOOLBAR ── */
    .toolbar{
      display:flex; gap:10px; padding:12px 22px; align-items:center; flex-wrap:wrap;
      background:#0a0a0a; border-bottom:1px solid rgba(255,255,255,0.04);
      position:sticky; top:108px; z-index:55;
    }
    .search-box{
      flex:1; min-width:180px; display:flex; align-items:center; gap:8px;
      background:#0f0f0f; border:1px solid #222; border-radius:12px; padding:9px 14px;
      transition:border-color .15s;
    }
    .search-box:focus-within{ border-color:rgba(255,0,0,0.4); }
    .search-box input{
      flex:1; border:none; outline:none; background:transparent; color:#fff;
      font-family:"Bungee",Arial,sans-serif; font-size:13px;
    }
    .search-box input::placeholder{ color:#444; }
    .search-box i{ color:#444; font-size:13px; }
    .tb-select{
      background:#0f0f0f; color:#fff; border:1px solid #222; border-radius:12px;
      padding:9px 12px; font-family:"Bungee",Arial,sans-serif; font-size:12px;
      cursor:pointer; outline:none; transition:border-color .15s;
    }
    .tb-select:focus{ border-color:rgba(255,0,0,0.4); }
    .tb-btn{
      background:var(--accent); border:none; color:#fff; padding:9px 18px;
      border-radius:12px; font-family:"Bungee",Arial,sans-serif; font-size:12px;
      cursor:pointer; transition:box-shadow .15s; white-space:nowrap;
    }
    .tb-btn:hover:not(:disabled){ box-shadow:0 0 14px var(--accent); }
    .tb-btn:disabled{ opacity:.5; cursor:not-allowed; }

    /* ── GRID ── */
    .wrap{ padding:20px 22px 60px; }
    .section-label{
      font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;
      margin:0 0 16px; display:flex; align-items:center; gap:10px;
    }
    .section-label::after{ content:''; flex:1; height:1px; background:#1a1a1a; }
    .grid{ display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }

    .card{
      background:var(--card); border:1px solid #1b1b1b; border-radius:14px;
      overflow:hidden; position:relative; cursor:pointer;
      transition:transform .15s, box-shadow .2s; display:block;
    }
    .card:hover{ transform:translateY(-4px); box-shadow:0 12px 28px rgba(255,0,0,0.18), 0 0 0 1px rgba(255,0,0,0.15); }
    .thumb{ width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:#0d0d0d; }

    .score-badge{
      position:absolute; top:8px; left:8px;
      background:rgba(0,0,0,0.82); border:1px solid rgba(255,200,0,0.3);
      border-radius:8px; padding:3px 7px; font-size:10px; color:#ffd700;
      display:flex; align-items:center; gap:3px; backdrop-filter:blur(4px);
    }
    .rank-badge{
      position:absolute; top:8px; right:8px;
      background:rgba(255,0,0,0.18); border:1px solid rgba(255,0,0,0.3);
      border-radius:8px; padding:3px 7px; font-size:10px; color:#ff9999;
      backdrop-filter:blur(4px);
    }
    .card-body{ padding:9px 11px 11px; }
    .card-title{
      font-size:11px; line-height:1.35; margin:0 0 6px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-meta{ display:flex; gap:5px; flex-wrap:wrap; }
    .chip{ background:#181818; border:1px solid #252525; border-radius:999px; padding:2px 8px; font-size:10px; color:#777; }
    .chip.red{ color:#ff9999; border-color:rgba(255,0,0,0.2); background:rgba(255,0,0,0.07); }

    /* load more */
    .load-wrap{ text-align:center; margin-top:28px; }
    .load-btn{
      background:transparent; border:1px solid #2a2a2a; color:#777; padding:11px 36px;
      border-radius:12px; font-family:"Bungee",Arial,sans-serif; font-size:12px; cursor:pointer;
      transition:border-color .15s, color .15s;
    }
    .load-btn:hover{ border-color:#555; color:#fff; }

    /* state */
    .state{ text-align:center; padding:70px 20px; color:var(--muted); }
    .state i{ font-size:40px; opacity:.2; display:block; margin-bottom:14px; }
    .state p{ margin:0 0 6px; font-size:13px; }
    .state small{ font-size:11px; color:#444; }

    /* skeleton */
    .skel{ background:#111; border:1px solid #1b1b1b; border-radius:14px; overflow:hidden; }
    .skel-img{ width:100%; aspect-ratio:3/4; background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
    .skel-line{ height:11px; border-radius:6px; margin:9px 11px 5px; background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
    .skel-line.s{ width:55%; }
    @keyframes shimmer{ 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* ── SETUP MODAL ── */
    .setup-overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:3000;
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .setup-card{
      background:#111; border:1px solid #333; border-radius:20px;
      padding:34px 30px; max-width:460px; width:100%;
    }
    .setup-card h2{ margin:0 0 8px; font-size:17px; }
    .setup-card p{ color:#777; font-size:12px; line-height:1.75; margin:0 0 18px; }
    .setup-card a{ color:#ff7777; }
    .setup-input{
      width:100%; padding:12px 14px; background:#0a0a0a; border:1px solid #333;
      border-radius:12px; color:#fff; font-family:"Bungee",Arial,sans-serif;
      font-size:12px; outline:none; margin-bottom:12px; box-sizing:border-box;
      transition:border-color .15s;
    }
    .setup-input:focus{ border-color:rgba(255,0,0,0.4); }
    .setup-btn{
      width:100%; padding:12px; background:var(--accent); border:none; border-radius:12px;
      color:#fff; font-family:"Bungee",Arial,sans-serif; font-size:12px; cursor:pointer;
      transition:box-shadow .15s;
    }
    .setup-btn:hover{ box-shadow:0 0 18px var(--accent); }
    .setup-skip{ width:100%; margin-top:8px; background:transparent; border:1px solid #2a2a2a; color:#555; padding:10px; border-radius:12px; font-family:"Bungee",Arial,sans-serif; font-size:11px; cursor:pointer; transition:color .15s; }
    .setup-skip:hover{ color:#aaa; }

    /* ── DETAIL MODAL ── */
    .mal-overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:2000;
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .mal-overlay.active{ opacity:1; pointer-events:auto; }
    .mal-modal{
      background:#111; border:1px solid #1e1e1e; border-radius:20px;
      max-width:680px; width:100%; max-height:88vh; overflow-y:auto;
      transform:scale(.94); transition:transform .2s; scrollbar-width:thin;
    }
    .mal-overlay.active .mal-modal{ transform:scale(1); }
    .mal-close-bar{
      position:sticky; top:0; z-index:1; display:flex; justify-content:flex-end;
      padding:14px 18px 0; background:linear-gradient(#111 70%,transparent 100%);
    }
    .mal-close-btn{
      background:#1a1a1a; border:1px solid #333; border-radius:10px; color:#aaa;
      padding:6px 14px; cursor:pointer; font-family:"Bungee",Arial,sans-serif; font-size:11px;
      transition:color .15s, border-color .15s;
    }
    .mal-close-btn:hover{ color:#fff; border-color:#555; }
    .mal-inner{ padding:6px 26px 30px; }
    .mal-hero{ display:grid; grid-template-columns:145px 1fr; gap:20px; margin-bottom:20px; align-items:start; }
    @media(max-width:480px){ .mal-hero{ grid-template-columns:1fr; } }
    .mal-cover{ width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:12px; display:block; box-shadow:0 8px 24px rgba(0,0,0,.6); }
    .mal-info{ display:flex; flex-direction:column; gap:10px; padding-top:2px; }
    .mal-title{ font-size:16px; line-height:1.3; margin:0; }
    .mal-title-en{ font-size:11px; color:#555; margin:0; }
    .mal-chips{ display:flex; flex-wrap:wrap; gap:5px; }
    .mal-chip{ background:#1a1a1a; border:1px solid #2a2a2a; border-radius:999px; padding:3px 10px; font-size:10px; color:#888; }
    .mal-chip.red{ background:rgba(255,0,0,0.09); border-color:rgba(255,0,0,0.22); color:#ff9999; }
    .mal-score{ display:flex; align-items:center; gap:6px; font-size:19px; color:#ffd700; }
    .mal-score i{ font-size:14px; }
    .mal-score small{ font-size:11px; color:#444; }
    .mal-synopsis-lbl{ font-size:10px; color:#444; letter-spacing:1.5px; text-transform:uppercase; margin:0 0 8px; }
    .mal-synopsis{ font-size:12px; color:#888; line-height:1.8; margin:0; }
    .mal-actions{ display:flex; gap:8px; flex-wrap:wrap; }
    .mal-link{
      display:inline-flex; align-items:center; gap:7px; padding:9px 16px;
      border-radius:11px; text-decoration:none; font-size:11px; color:#fff;
      background:#1a1a1a; border:1px solid #2a2a2a; cursor:pointer;
      transition:background .15s, border-color .15s;
    }
    .mal-link:hover{ background:#222; border-color:#444; }
    .mal-link.add{ background:rgba(255,0,0,0.1); border-color:rgba(255,0,0,0.28); color:#ff9999; }
    .mal-link.add:hover{ background:rgba(255,0,0,0.2); }

    /* ── ADD PANEL ── */
    .add-panel{
      margin-top:20px; padding:18px; border-radius:14px;
      background:#0c0c0c; border:1px solid rgba(255,0,0,0.18);
      display:none;
    }
    .add-panel.open{ display:block; }
    .add-panel-hd{ font-size:12px; color:#ccc; margin:0 0 14px; display:flex; align-items:center; gap:7px; }
    .add-panel-hd i{ color:rgba(255,0,0,0.6); }
    .add-layout{ display:grid; grid-template-columns:88px 1fr; gap:14px; margin-bottom:14px; align-items:start; }
    @media(max-width:460px){ .add-layout{ grid-template-columns:1fr; } }
    .add-cover{ width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:10px; border:1px solid #222; display:block; }
    .add-fields{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .add-field{ display:flex; flex-direction:column; gap:5px; }
    .add-field.full{ grid-column:span 2; }
    .add-lbl{ font-size:10px; color:#555; }
    .add-in, .add-sel{
      padding:9px 11px; background:#111; border:1px solid #222;
      border-radius:10px; color:#fff; font-family:"Bungee",Arial,sans-serif;
      font-size:11px; outline:none; width:100%; box-sizing:border-box; transition:border-color .15s;
    }
    .add-in:focus, .add-sel:focus{ border-color:rgba(255,0,0,0.4); }
    .add-footer{ display:flex; gap:8px; align-items:center; }
    .add-save{
      display:inline-flex; align-items:center; gap:7px; padding:10px 20px;
      border-radius:11px; border:none; background:linear-gradient(135deg,#c00,#ff000086);
      color:#fff; font-family:"Bungee",Arial,sans-serif; font-size:11px; cursor:pointer;
      box-shadow:0 4px 14px rgba(255,0,0,0.22); transition:box-shadow .15s, transform .12s;
    }
    .add-save:hover:not(:disabled){ box-shadow:0 0 20px rgba(255,0,0,0.45); transform:translateY(-1px); }
    .add-save:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
    .add-cancel{
      background:transparent; border:1px solid #2a2a2a; color:#666; padding:10px 16px;
      border-radius:11px; font-family:"Bungee",Arial,sans-serif; font-size:11px; cursor:pointer;
      transition:color .15s, border-color .15s;
    }
    .add-cancel:hover{ color:#ccc; border-color:#555; }
    .add-msg{ font-size:11px; color:#4caf50; }
  </style>
</head>
<body>
  <script type="module" src="js/auth-guard.js"></script>

  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>


  <!-- Detail modal -->
  <div class="mal-overlay" id="detailModal">
    <div class="mal-modal">
      <div class="mal-close-bar">
        <button class="mal-close-btn" id="modalClose"><i class="fa-solid fa-xmark"></i> Close</button>
      </div>
      <div class="mal-inner">
        <div id="modalContent"></div>
        <!-- Add to Library panel -->
        <div class="add-panel" id="addPanel">
          <p class="add-panel-hd"><i class="fa-solid fa-plus"></i> Add to My Library</p>
          <div class="add-layout">
            <img class="add-cover" id="addCover" src="" alt="">
            <div class="add-fields">
              <div class="add-field full">
                <span class="add-lbl">Title</span>
                <input class="add-in" id="addTitle" type="text">
              </div>
              <div class="add-field">
                <span class="add-lbl">Type</span>
                <select class="add-sel" id="addType">
                  <option value="anime">Anime</option>
                  <option value="manhwa">Manhwa</option>
                  <option value="manhua">Manhua</option>
                  <option value="manga">Manga</option>
                  <option value="movie">Movie</option>
                </select>
              </div>
              <div class="add-field">
                <span class="add-lbl">Status</span>
                <select class="add-sel" id="addStatus">
                  <option value="planning">Planning</option>
                  <option value="watching">Watching</option>
                  <option value="reading">Reading</option>
                  <option value="completed">Completed</option>
                  <option value="on_hold">On Hold</option>
                  <option value="dropped">Dropped</option>
                </select>
              </div>
              <div class="add-field full">
                <span class="add-lbl">Genre</span>
                <input class="add-in" id="addGenre" type="text">
              </div>
            </div>
          </div>
          <div class="add-footer">
            <button class="add-save" id="addSaveBtn"><i class="fa-solid fa-plus"></i> Add</button>
            <button class="add-cancel" id="addCancelBtn">Cancel</button>
            <span class="add-msg" id="addMsg"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab active" data-tab="anime">    <i class="fa-solid fa-tv"></i>           Anime</button>
    <button class="tab"        data-tab="manhwa">   <i class="fa-solid fa-book-open"></i>    Manhwa</button>
    <button class="tab"        data-tab="manhua">   <i class="fa-solid fa-book"></i>         Manhua</button>
    <button class="tab"        data-tab="manga">    <i class="fa-solid fa-scroll"></i>       Manga</button>
    <button class="tab"        data-tab="movies">   <i class="fa-solid fa-film"></i>         Movies</button>
    <button class="tab"        data-tab="trending"> <i class="fa-solid fa-fire"></i>         Trending</button>
    <button class="tab"        data-tab="seasonal"> <i class="fa-solid fa-calendar-days"></i> Seasonal</button>
  </div>

  <!-- Toolbar (search + filter) -->
  <div class="toolbar" id="mainToolbar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="q" type="text" placeholder="Search..." />
    </div>
    <select class="tb-select" id="filterSel"></select>
    <button class="tb-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
    <button class="tb-btn" id="genreToggleBtn" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;"><i class="fa-solid fa-sliders"></i> Genre</button>
  </div>

  <!-- Seasonal toolbar (replaces main toolbar on seasonal tab) -->
  <div class="toolbar" id="seasonalToolbar" style="display:none;gap:8px;flex-wrap:wrap;">
    <select class="tb-select" id="yearSel" style="min-width:90px;"></select>
    <div id="seasonPills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>

  <!-- Genre filter panel -->
  <div id="genrePanel" style="display:none;padding:10px 22px 12px;background:#050505;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;gap:8px;"></div>

  <div class="wrap">
    <p class="section-label" id="sectionLabel">Top Anime</p>
    <div id="grid" class="grid"></div>
    <div id="stateEl" class="state" style="display:none"></div>
    <div class="load-wrap">
      <button class="load-btn" id="loadMoreBtn" style="display:none">Load More</button>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════
       CONFIG
    ══════════════════════════════════════════════════ */
    const JIKAN_BASE = 'https://api.jikan.moe/v4';
    const MDX_BASE   = 'https://api.mangadex.org';
    const TMDB_IMG   = 'https://image.tmdb.org/t/p/w500';

    const TMDB_GENRES = {
      28:'Action',12:'Adventure',16:'Animation',35:'Comedy',80:'Crime',
      99:'Documentary',18:'Drama',10751:'Family',14:'Fantasy',36:'History',
      27:'Horror',10402:'Music',9648:'Mystery',10749:'Romance',878:'Sci-Fi',
      53:'Thriller',10752:'War',37:'Western',10770:'TV Movie'
    };

    // Genre filters per tab type
    const GENRE_FILTERS = {
      anime: [
        {id:1,name:'Action'},{id:2,name:'Adventure'},{id:4,name:'Comedy'},
        {id:8,name:'Drama'},{id:10,name:'Fantasy'},{id:14,name:'Horror'},
        {id:7,name:'Mystery'},{id:22,name:'Romance'},{id:24,name:'Sci-Fi'},
        {id:30,name:'Sports'},{id:36,name:'Slice of Life'},{id:37,name:'Supernatural'},
      ],
      movies: [
        {id:28,name:'Action'},{id:16,name:'Animation'},{id:35,name:'Comedy'},
        {id:18,name:'Drama'},{id:27,name:'Horror'},{id:10749,name:'Romance'},
        {id:878,name:'Sci-Fi'},{id:53,name:'Thriller'},
      ],
      manga: [
        {id:'391b0423-d847-456f-aff0-8b0cfc03066b',name:'Action'},
        {id:'4d32cc48-9f00-4cca-9b5a-a839f0764984',name:'Comedy'},
        {id:'b9af3a63-f058-46de-a9a0-e0c13906197a',name:'Drama'},
        {id:'cdc58593-87dd-415e-bbc0-2ec27bf404cc',name:'Fantasy'},
        {id:'cdad7e68-1419-41dd-bdce-27753a7bf89e',name:'Horror'},
        {id:'ee968100-4191-4968-93d3-f68d863cc930',name:'Mystery'},
        {id:'423e2eae-a7a2-4a8b-ac03-a8351462d71d',name:'Romance'},
        {id:'256c8bd9-4904-4360-bf4f-508a76d67183',name:'Sci-Fi'},
      ],
    };
    GENRE_FILTERS.manhwa = GENRE_FILTERS.manga;
    GENRE_FILTERS.manhua = GENRE_FILTERS.manga;

    // Seasonal helpers
    function currentSeason(){
      const m = new Date().getMonth();
      if (m < 3) return 'winter';
      if (m < 6) return 'spring';
      if (m < 9) return 'summer';
      return 'fall';
    }
    function currentYear(){ return new Date().getFullYear(); }

    /* ══════════════════════════════════════════════════
       TAB DEFINITIONS
    ══════════════════════════════════════════════════ */
    const TABS = {
      anime: {
        filters: [
          {v:'',            l:'Top All'},
          {v:'airing',      l:'Airing'},
          {v:'upcoming',    l:'Upcoming'},
          {v:'bypopularity',l:'Popular'},
          {v:'favorite',    l:'Favourite'},
          {v:'movie',       l:'Movie'},
          {v:'tv',          l:'TV Series'},
          {v:'ova',         l:'OVA / ONA'},
        ]
      },
      manhwa:  { lang:'ko', filters: mdxFilters() },
      manhua:  { lang:'zh', filters: mdxFilters() },
      manga:   { lang:'ja', filters: mdxFilters() },
      movies: {
        filters: [
          {v:'popular',    l:'Popular'},
          {v:'top_rated',  l:'Top Rated'},
          {v:'now_playing',l:'Now Playing'},
          {v:'upcoming',   l:'Upcoming'},
        ]
      },
      trending: { filters: [] },
      seasonal: { filters: [] },
    };

    function mdxFilters(){
      return [
        {v:'followedCount', l:'Most Followed'},
        {v:'rating',        l:'Top Rated'},
        {v:'latestUploadedChapter', l:'Latest Updated'},
        {v:'createdAt',     l:'Newest'},
      ];
    }

    /* ══════════════════════════════════════════════════
       STATE
    ══════════════════════════════════════════════════ */
    let activeTab      = 'anime';
    let curPage        = 1;
    let curOffset      = 0;
    let lastMode       = 'top';
    let hasNext        = false;
    let loading        = false;
    let selectedGenres = new Set();
    let activeSeason   = currentSeason();
    let activeYear     = currentYear();

    /* ══════════════════════════════════════════════════
       DOM
    ══════════════════════════════════════════════════ */
    const grid           = document.getElementById('grid');
    const stateEl        = document.getElementById('stateEl');
    const sectionLbl     = document.getElementById('sectionLabel');
    const loadMoreBtn    = document.getElementById('loadMoreBtn');
    const searchBtn      = document.getElementById('searchBtn');
    const qInput         = document.getElementById('q');
    const filterSel      = document.getElementById('filterSel');
    const mainToolbar    = document.getElementById('mainToolbar');
    const seasonalToolbar= document.getElementById('seasonalToolbar');
    const genrePanel     = document.getElementById('genrePanel');
    const genreToggleBtn = document.getElementById('genreToggleBtn');
    const yearSel        = document.getElementById('yearSel');
    const seasonPills    = document.getElementById('seasonPills');

    /* ══════════════════════════════════════════════════
       TAB SWITCHING
    ══════════════════════════════════════════════════ */
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        qInput.value = '';
        selectedGenres.clear();
        buildFilters();
        buildGenrePanel();
        resetFetch();
      });
    });

    function buildFilters(){
      const isSeasonal  = activeTab === 'seasonal';
      const isTrending  = activeTab === 'trending';
      mainToolbar.style.display    = isSeasonal ? 'none' : '';
      seasonalToolbar.style.display= isSeasonal ? ''     : 'none';
      genrePanel.style.display     = (isSeasonal || isTrending) ? 'none' : 'none'; // keep closed on switch
      genreToggleBtn.style.display = (isSeasonal || isTrending) ? 'none' : '';

      if (isSeasonal) { buildSeasonalControls(); return; }

      const opts = TABS[activeTab]?.filters || [];
      filterSel.innerHTML = opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
    }

    function buildSeasonalControls(){
      // Year dropdown: 2010 to currentYear+1
      const cy = currentYear();
      yearSel.innerHTML = Array.from({length: cy - 2009}, (_,i) => cy + 1 - i)
        .map(y => `<option value="${y}" ${y===activeYear?'selected':''}>${y}</option>`).join('');
      yearSel.onchange = () => { activeYear = Number(yearSel.value); resetFetch(); };

      // Season pills
      const seasons = ['winter','spring','summer','fall'];
      seasonPills.innerHTML = seasons.map(s => `
        <button class="tab ${s===activeSeason?'active':''}" data-season="${s}" style="padding:6px 14px;font-size:11px;">
          ${s.charAt(0).toUpperCase()+s.slice(1)}
        </button>`).join('');
      seasonPills.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          seasonPills.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
          activeSeason = b.dataset.season;
          resetFetch();
        });
      });
    }

    function buildGenrePanel(){
      const genres = GENRE_FILTERS[activeTab] || [];
      if (!genres.length) { genrePanel.style.display='none'; return; }
      genrePanel.innerHTML = genres.map(g => `
        <button class="genre-chip" data-id="${g.id}" style="padding:5px 12px;border-radius:999px;border:1px solid #2a2a2a;background:transparent;color:#666;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;">
          ${g.name}
        </button>`).join('');
      genrePanel.querySelectorAll('.genre-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          if (selectedGenres.has(id)) {
            selectedGenres.delete(id);
            btn.style.cssText = 'padding:5px 12px;border-radius:999px;border:1px solid #2a2a2a;background:transparent;color:#666;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;';
          } else {
            selectedGenres.add(id);
            btn.style.cssText = 'padding:5px 12px;border-radius:999px;border:1px solid rgba(255,0,0,.4);background:rgba(255,0,0,.12);color:#ff9999;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;';
          }
          resetFetch();
        });
      });
    }

    genreToggleBtn.addEventListener('click', () => {
      const open = genrePanel.style.display === 'flex' || genrePanel.style.display === '';
      if (open && genrePanel.style.display !== 'none') {
        genrePanel.style.display = 'none';
        genreToggleBtn.style.color = '#aaa';
      } else {
        buildGenrePanel();
        genrePanel.style.display = 'flex';
        genreToggleBtn.style.color = '#ff9999';
      }
    });

    filterSel.addEventListener('change', () => { resetFetch(); });


    /* ══════════════════════════════════════════════════
       FETCH ORCHESTRATOR
    ══════════════════════════════════════════════════ */
    function resetFetch(){
      curPage = 1; curOffset = 0; lastMode = 'top';
      doLoad(false);
    }

    function doLoad(append){
      const q = qInput.value.trim();
      lastMode = q ? 'search' : 'top';
      if (activeTab === 'trending')                             loadTrending();
      else if (activeTab === 'seasonal')                        loadSeasonal(append);
      else if (activeTab === 'anime')                           loadJikan(append, q);
      else if (['manhwa','manhua','manga'].includes(activeTab)) loadMDX(append, q);
      else if (activeTab === 'movies')                          loadTMDB(append, q);
    }

    /* ══════════════════════════════════════════════════
       JIKAN (Anime)
    ══════════════════════════════════════════════════ */
    async function loadJikan(append, q){
      if (loading) return;
      loading = true; setSearching(true);
      if (!append) showSkeletons();
      const filter = filterSel.value;
      const filterLbl = filterSel.options[filterSel.selectedIndex]?.text || '';
      const genreParam = selectedGenres.size ? `&genres=${[...selectedGenres].join(',')}` : '';
      try {
        let url, data;
        if (q) {
          url  = `${JIKAN_BASE}/anime?q=${enc(q)}&page=${curPage}&limit=24&sfw${genreParam}`;
          sectionLbl.textContent = `Anime — "${q}"`;
        } else {
          url  = `${JIKAN_BASE}/top/anime?page=${curPage}&limit=24${filter?'&filter='+filter:''}${genreParam}`;
          sectionLbl.textContent = `Anime — ${filterLbl}`;
        }
        data = await safeFetch(url);
        const items = (data.data||[]).map(normalizeJikan);
        hasNext = data.pagination?.has_next_page || false;
        renderItems(items, append);
      } catch(e){ handleErr(e, append); }
      finally{ loading=false; setSearching(false); }
    }

    async function loadSeasonal(append){
      if (loading) return;
      loading = true; setSearching(false);
      if (!append) showSkeletons();
      sectionLbl.textContent = `${activeSeason.charAt(0).toUpperCase()+activeSeason.slice(1)} ${activeYear} Anime`;
      try {
        const url  = `${JIKAN_BASE}/seasons/${activeYear}/${activeSeason}?limit=24`;
        const data = await safeFetch(url);
        const items = (data.data||[]).map(normalizeJikan);
        hasNext = data.pagination?.has_next_page || false;
        renderItems(items, append);
      } catch(e){ handleErr(e, append); }
      finally{ loading=false; }
    }

    async function loadTrending(){
      grid.innerHTML = '';
      hideState();
      loadMoreBtn.style.display = 'none';
      sectionLbl.textContent = 'Trending This Week';

      // Load all three in parallel, render in sections
      const [animeData, mdxData, tmdbData] = await Promise.allSettled([
        safeFetch(`${JIKAN_BASE}/top/anime?page=1&limit=8&filter=airing`),
        safeFetch(`${MDX_BASE}/manga?limit=8&offset=0&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive&order[followedCount]=desc`),
        safeFetch(`/api/tmdb?path=trending/all/week&language=en-US`),
      ]);

      function renderSection(label, items){
        if (!items.length) return;
        grid.insertAdjacentHTML('beforeend', `<div style="grid-column:1/-1;font-size:11px;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 8px;padding-bottom:8px;border-bottom:1px solid #1a1a1a;">${label}</div>`);
        items.forEach(it => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img class="thumb" src="${esc(it.cover)}" alt="${esc(it.title)}" loading="lazy" onerror="this.src='https://via.placeholder.com/225x318?text=No+Image'">
            ${it.score ? `<div class="score-badge"><i class="fa-solid fa-star"></i>${it.score}</div>` : ''}
            <div class="card-body">
              <p class="card-title">${esc(it.title)}</p>
              <div class="card-meta">
                <span class="chip red">${esc(it.type)}</span>
                ${it.genres.slice(0,1).map(g=>`<span class="chip">${esc(g)}</span>`).join('')}
              </div>
            </div>`;
          card.addEventListener('click', () => openModal(it));
          grid.appendChild(card);
        });
      }

      if (animeData.status === 'fulfilled') renderSection('🔥 Trending Anime', (animeData.value.data||[]).map(normalizeJikan));
      if (mdxData.status   === 'fulfilled') renderSection('📚 Trending Manga', (mdxData.value.data||[]).map(it=>normalizeMDX(it,'manga')));
      if (tmdbData.status  === 'fulfilled') {
        const movies = (tmdbData.value.results||[]).filter(r=>r.media_type==='movie'||!r.media_type).slice(0,8).map(normalizeTMDB);
        if (movies.length) renderSection('🎬 Trending Movies', movies);
      }

      if (!grid.children.length) showState('fa-face-frown','Could not load trending data.');
    }

    function normalizeJikan(it){
      return {
        title:    it.title || '',
        titleEn:  it.title_english && it.title_english !== it.title ? it.title_english : '',
        cover:    it.images?.jpg?.large_image_url || it.images?.jpg?.image_url || '',
        score:    it.score ? Number(it.score).toFixed(1) : null,
        rank:     it.rank  ? `#${it.rank}` : null,
        type:     (it.type||'').replace(/_/g,' '),
        status:   it.status || '',
        episodes: it.episodes ? `${it.episodes} ep` : '',
        chapters: '',
        genres:   (it.genres||[]).map(g=>g.name),
        synopsis: (it.synopsis||'').replace(/\[Written by.*?\]/gi,'').trim(),
        url:      it.url || '',
        libType:  mapJikanType(it.type),
        libStatus:mapMalStatus(it.status),
      };
    }

    function mapJikanType(t){
      t = (t||'').toLowerCase();
      if (t==='movie') return 'movie';
      return 'anime';
    }
    function mapMalStatus(s){
      s = (s||'').toLowerCase();
      if (s.includes('finish')) return 'completed';
      if (s.includes('hiatus')) return 'on_hold';
      return 'watching';
    }

    /* ══════════════════════════════════════════════════
       MANGADEX (Manhwa / Manhua / Manga)
    ══════════════════════════════════════════════════ */
    async function loadMDX(append, q){
      if (loading) return;
      loading = true; setSearching(true);
      if (!append) showSkeletons();
      const lang   = TABS[activeTab].lang;
      const sort   = filterSel.value || 'followedCount';
      const tabLbl = document.querySelector('.tab.active')?.textContent.trim() || '';
      const filterLbl = filterSel.options[filterSel.selectedIndex]?.text || '';
      const tagParam = selectedGenres.size ? [...selectedGenres].map(id=>`&includedTags[]=${id}`).join('') : '';
      try {
        let url;
        const base = `${MDX_BASE}/manga?limit=24&offset=${curOffset}&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive${tagParam}`;
        if (q) {
          url = `${base}&title=${enc(q)}&originalLanguage[]=${lang}`;
          sectionLbl.textContent = `${tabLbl} — "${q}"`;
        } else {
          url = `${base}&originalLanguage[]=${lang}&order[${sort}]=desc`;
          sectionLbl.textContent = `${tabLbl} — ${filterLbl}`;
        }
        const data  = await safeFetch(url);
        const items = (data.data||[]).map(it => normalizeMDX(it, activeTab));
        hasNext = (data.total || 0) > curOffset + items.length;
        curOffset += items.length;
        renderItems(items, append);
      } catch(e){ handleErr(e, append); }
      finally{ loading=false; setSearching(false); }
    }

    function normalizeMDX(it, tab){
      const attr  = it.attributes || {};
      const title = attr.title?.en || Object.values(attr.title||{})[0] || '';
      const desc  = attr.description?.en || Object.values(attr.description||{})[0] || '';
      const coverRel = (it.relationships||[]).find(r=>r.type==='cover_art');
      const fileName = coverRel?.attributes?.fileName || '';
      const coverUrl = fileName ? `https://uploads.mangadex.org/covers/${it.id}/${fileName}.512.jpg` : '';
      const cover    = coverUrl ? `/api/mangadex-image?url=${encodeURIComponent(coverUrl)}` : '';
      const genres = (attr.tags||[]).filter(t=>t.attributes?.group==='genre').map(t=>t.attributes?.name?.en||'');
      const libTypeMap = { manhwa:'manhwa', manhua:'manhua', manga:'manga' };
      return {
        title, titleEn:'', cover,
        score:    attr.rating?.bayesian ? Number(attr.rating.bayesian).toFixed(1) : null,
        rank:     null,
        type:     tab.charAt(0).toUpperCase()+tab.slice(1),
        status:   attr.status || '',
        episodes: '', chapters: attr.lastChapter ? `Ch.${attr.lastChapter}` : '',
        genres,
        synopsis: desc.replace(/\[.*?\]/g,'').trim(),
        url:      `https://mangadex.org/title/${it.id}`,
        libType:  libTypeMap[tab] || 'manga',
        libStatus: attr.status === 'completed' ? 'completed' : attr.status === 'hiatus' ? 'on_hold' : 'reading',
      };
    }

    /* ══════════════════════════════════════════════════
       TMDB (Movies)
    ══════════════════════════════════════════════════ */
    async function loadTMDB(append, q){
      if (loading) return;
      loading = true; setSearching(true);
      if (!append) showSkeletons();
      const filter     = filterSel.value || 'popular';
      const filterLbl  = filterSel.options[filterSel.selectedIndex]?.text || '';
      const genreParam = selectedGenres.size ? `&with_genres=${[...selectedGenres].join(',')}` : '';
      try {
        let url;
        if (q) {
          url = `/api/tmdb?path=search/movie&query=${enc(q)}&page=${curPage}&language=en-US${genreParam}`;
          sectionLbl.textContent = `Movies — "${q}"`;
        } else {
          url = `/api/tmdb?path=discover/movie&sort_by=popularity.desc&page=${curPage}&language=en-US${genreParam}`;
          if (!selectedGenres.size) url = `/api/tmdb?path=movie/${filter}&page=${curPage}&language=en-US`;
          sectionLbl.textContent = `Movies — ${filterLbl}`;
        }
        const data  = await safeFetch(url);
        const items = (data.results||[]).map(normalizeTMDB);
        hasNext = curPage < (data.total_pages||1);
        renderItems(items, append);
      } catch(e){ handleErr(e, append); }
      finally{ loading=false; setSearching(false); }
    }

    function normalizeTMDB(it){
      const genres = (it.genre_ids||[]).map(id=>TMDB_GENRES[id]).filter(Boolean);
      return {
        title:    it.title || it.name || '',
        titleEn:  '',
        cover:    it.poster_path ? `${TMDB_IMG}${it.poster_path}` : '',
        score:    it.vote_average ? Number(it.vote_average).toFixed(1) : null,
        rank:     null,
        type:     'Movie',
        status:   it.release_date ? it.release_date.slice(0,4) : '',
        episodes: '', chapters: '',
        genres,
        synopsis: it.overview || '',
        url:      `https://www.themoviedb.org/movie/${it.id}`,
        libType:  'movie',
        libStatus:'completed',
      };
    }

    /* ══════════════════════════════════════════════════
       RENDER
    ══════════════════════════════════════════════════ */
    function renderItems(items, append){
      if (!append) grid.innerHTML = '';
      hideState();
      if (!items.length && !append){ showState('fa-face-frown','No results found.'); return; }
      items.forEach(it => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img class="thumb" src="${esc(it.cover)}" alt="${esc(it.title)}" loading="lazy"
               onerror="this.src='https://via.placeholder.com/225x318?text=No+Image'">
          ${it.score ? `<div class="score-badge"><i class="fa-solid fa-star"></i>${it.score}</div>` : ''}
          ${it.rank  ? `<div class="rank-badge">${it.rank}</div>` : ''}
          <div class="card-body">
            <p class="card-title">${esc(it.title)}</p>
            <div class="card-meta">
              <span class="chip red">${esc(it.type)}</span>
              ${it.genres.slice(0,1).map(g=>`<span class="chip">${esc(g)}</span>`).join('')}
            </div>
          </div>`;
        card.addEventListener('click', () => openModal(it));
        grid.appendChild(card);
      });
      loadMoreBtn.style.display = hasNext ? 'inline-block' : 'none';
    }

    /* ══════════════════════════════════════════════════
       DETAIL MODAL
    ══════════════════════════════════════════════════ */
    const detailModal  = document.getElementById('detailModal');
    const modalContent = document.getElementById('modalContent');
    const addPanel     = document.getElementById('addPanel');

    function openModal(it){
      addPanel.classList.remove('open');
      document.getElementById('addMsg').textContent = '';

      const chips = [
        it.type   ? `<span class="mal-chip red">${esc(it.type)}</span>` : '',
        it.status ? `<span class="mal-chip">${esc(it.status)}</span>` : '',
        it.episodes ? `<span class="mal-chip">${esc(it.episodes)}</span>` : '',
        it.chapters ? `<span class="mal-chip">${esc(it.chapters)}</span>` : '',
        ...it.genres.map(g=>`<span class="mal-chip">${esc(g)}</span>`),
      ].join('');

      modalContent.innerHTML = `
        <div class="mal-hero">
          ${it.cover ? `<img class="mal-cover" src="${esc(it.cover)}" alt="${esc(it.title)}" onerror="this.src='https://via.placeholder.com/145x205?text=No+Image'">` : ''}
          <div class="mal-info">
            <p class="mal-title">${esc(it.title)}</p>
            ${it.titleEn ? `<p class="mal-title-en">${esc(it.titleEn)}</p>` : ''}
            <div class="mal-chips">${chips}</div>
            ${it.score ? `<div class="mal-score"><i class="fa-solid fa-star"></i>${it.score}<small>/ 10</small></div>` : ''}
            <div class="mal-actions">
              ${it.url ? `<a class="mal-link" href="${esc(it.url)}" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square"></i> View Source</a>` : ''}
              <button class="mal-link add" id="openAddBtn"><i class="fa-solid fa-plus"></i> Add to Library</button>
            </div>
          </div>
        </div>
        ${it.synopsis ? `<p class="mal-synopsis-lbl">Synopsis</p><p class="mal-synopsis">${esc(it.synopsis)}</p>` : ''}
        <div id="moreLikeThisSection" style="margin-top:24px;"></div>
      `;

      loadMoreLikeThis(it);

      document.getElementById('openAddBtn').addEventListener('click', () => {
        document.getElementById('addCover').src    = it.cover;
        document.getElementById('addTitle').value  = it.title;
        document.getElementById('addType').value   = it.libType;
        document.getElementById('addStatus').value = it.libStatus;
        document.getElementById('addGenre').value  = it.genres.join(', ');
        document.getElementById('addMsg').textContent = '';
        document.getElementById('addSaveBtn').disabled = false;
        document.getElementById('addSaveBtn').innerHTML = '<i class="fa-solid fa-plus"></i> Add';
        addPanel.classList.add('open');
        addPanel.scrollIntoView({ behavior:'smooth', block:'nearest' });
      });

      detailModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(){
      detailModal.classList.remove('active');
      addPanel.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    detailModal.addEventListener('click', e => { if(e.target===detailModal) closeModal(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
    document.getElementById('addCancelBtn').addEventListener('click', () => addPanel.classList.remove('open'));

    /* ══════════════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════════════ */
    async function safeFetch(url, headers={}){
      // Proxy MangaDex requests to avoid CORS issues
      const fetchUrl = url.startsWith('https://api.mangadex.org')
        ? `/api/mangadex?url=${encodeURIComponent(url)}`
        : url;
      const res = await fetch(fetchUrl, { headers });
      if (res.status===429) throw new Error('rate_limit');
      if (!res.ok) throw new Error(`${res.status}`);
      return res.json();
    }

    function handleErr(e, append){
      if (!append) grid.innerHTML = '';
      if (e.message==='rate_limit') showState('fa-clock','Too many requests — wait a moment and try again.');
      else showState('fa-circle-exclamation', `Error: ${e.message}`);
      loadMoreBtn.style.display = 'none';
    }

    function showSkeletons(){
      grid.innerHTML=''; hideState();
      for(let i=0;i<24;i++) grid.insertAdjacentHTML('beforeend',`<div class="skel"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div></div>`);
    }
    function showState(icon, html){
      stateEl.style.display='block';
      stateEl.innerHTML=`<i class="fa-solid ${icon}"></i><p>${html}</p>`;
    }
    function hideState(){ stateEl.style.display='none'; }
    function setSearching(on){
      searchBtn.disabled=on;
      searchBtn.innerHTML=on?'<i class="fa-solid fa-spinner fa-spin"></i> Loading...':'<i class="fa-solid fa-magnifying-glass"></i> Search';
    }
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function enc(s){ return encodeURIComponent(s||''); }

    /* ══════════════════════════════════════════════════
       MORE LIKE THIS
    ══════════════════════════════════════════════════ */
    async function loadMoreLikeThis(it){
      const section = document.getElementById('moreLikeThisSection');
      if (!section || !it.genres.length) return;

      section.innerHTML = '<p style="font-size:10px;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 10px;">More Like This</p><p style="font-size:11px;color:#444;">Loading...</p>';

      try {
        let items = [];

        if (it.libType === 'anime') {
          const firstGenre = it.genres[0]?.toLowerCase();
          const match = GENRE_FILTERS.anime.find(g => g.name.toLowerCase() === firstGenre);
          if (match) {
            const data = await safeFetch(`${JIKAN_BASE}/anime?genres=${match.id}&limit=8&sfw`);
            items = (data.data||[]).map(normalizeJikan).filter(x => x.title !== it.title).slice(0,6);
          }
        } else if (['manga','manhwa','manhua'].includes(it.libType)) {
          const firstGenre = it.genres[0]?.toLowerCase();
          const match = GENRE_FILTERS.manga.find(g => g.name.toLowerCase() === firstGenre);
          if (match) {
            const lang = {manhwa:'ko',manhua:'zh',manga:'ja'}[it.libType] || 'ja';
            const data = await safeFetch(`${MDX_BASE}/manga?limit=8&offset=0&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive&includedTags[]=${match.id}&originalLanguage[]=${lang}`);
            items = (data.data||[]).map(x => normalizeMDX(x, it.libType)).filter(x => x.title !== it.title).slice(0,6);
          }
        } else if (it.libType === 'movie') {
          let genreId = null;
          for (const g of it.genres) {
            const entry = Object.entries(TMDB_GENRES).find(([,name]) => name.toLowerCase() === g.toLowerCase());
            if (entry){ genreId = entry[0]; break; }
          }
          if (genreId) {
            const data = await safeFetch(`/api/tmdb?path=discover/movie&with_genres=${genreId}&sort_by=popularity.desc&page=1&language=en-US`);
            items = (data.results||[]).slice(0,6).map(normalizeTMDB).filter(x => x.title !== it.title);
          }
        }

        if (!items.length){ section.style.display='none'; return; }

        section.innerHTML = '<p style="font-size:10px;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 12px;">More Like This</p>';
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin;';
        items.forEach(x => {
          const card = document.createElement('div');
          card.style.cssText = 'flex:0 0 88px;cursor:pointer;transition:opacity .15s;';
          card.innerHTML = `
            <img src="${esc(x.cover)}" alt="${esc(x.title)}"
              style="width:88px;height:122px;object-fit:cover;border-radius:8px;display:block;border:1px solid #1e1e1e;"
              onerror="this.src='https://via.placeholder.com/88x122?text=?'">
            <p style="font-size:9px;color:#888;margin:5px 0 0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(x.title)}</p>`;
          card.addEventListener('mouseenter', () => card.style.opacity='.75');
          card.addEventListener('mouseleave', () => card.style.opacity='1');
          card.addEventListener('click', () => openModal(x));
          row.appendChild(card);
        });
        section.appendChild(row);
      } catch(e){
        section.style.display = 'none';
      }
    }

    /* ══════════════════════════════════════════════════
       EVENTS
    ══════════════════════════════════════════════════ */
    searchBtn.addEventListener('click', () => { curPage=1; curOffset=0; doLoad(false); });
    qInput.addEventListener('keydown', e => { if(e.key==='Enter'){ curPage=1; curOffset=0; doLoad(false); } });

    // Live search — 500 ms debounce (external API, avoid hammering)
    let _searchTimer;
    qInput.addEventListener('input', () => {
      if (['trending','seasonal'].includes(activeTab)) return; // no search on these tabs
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(() => { curPage=1; curOffset=0; doLoad(false); }, 500);
    });
    loadMoreBtn.addEventListener('click', () => {
      if (['manhwa','manhua','manga'].includes(activeTab)) { doLoad(true); }
      else { curPage++; doLoad(true); }
    });

    /* ══════════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════════ */
    buildFilters();
    resetFetch();
  </script>

  <!-- Firebase save (module script) -->
  <script type="module">
    import { addWishlistItemFromUrl } from "./js/firebase-service.js";
    import { showToast } from "./js/toast.js";

    const saveBtn  = document.getElementById('addSaveBtn');
    const addMsg   = document.getElementById('addMsg');
    const addPanel = document.getElementById('addPanel');

    saveBtn.addEventListener('click', async () => {
      const title  = document.getElementById('addTitle').value.trim();
      const type   = document.getElementById('addType').value;
      const status = document.getElementById('addStatus').value;
      const genre  = document.getElementById('addGenre').value.trim();
      const cover  = document.getElementById('addCover').src;

      if (!title){ showToast('Title is required.', 'error'); return; }

      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
      addMsg.textContent = '';
      addMsg.style.color = '#4caf50';

      try {
        await addWishlistItemFromUrl({ title, type, status, genre }, cover);
        saveBtn.innerHTML = '<i class="fa-solid fa-check"></i> Added!';
        addMsg.textContent = 'Saved to your library!';
        showToast(`"${title}" added to library!`, 'success');
        setTimeout(() => {
          addPanel.classList.remove('open');
          saveBtn.disabled = false;
          saveBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Add';
          addMsg.textContent = '';
        }, 1800);
      } catch(err) {
        showToast(err.message || 'Failed to save.', 'error');
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Add';
      }
    });
  </script>
</body>
