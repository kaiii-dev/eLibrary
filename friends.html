<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="main.jpg" />
  <title>Friends — My E-Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/3c6e6d7c17.js" crossorigin="anonymous"></script>
  <style>
    :root { --bg:#000; --accent:#ff000086; --card:#111; --text:#f5f5f5; --muted:#666; }
    body  { margin:0; background:var(--bg); color:var(--text); font-family:"Bungee",Arial,sans-serif; min-height:100vh; }

    /* Tabs */
    .tabs-bar {
      display:flex; gap:4px; padding:12px 22px;
      background:#050505; border-bottom:1px solid #1a1a1a;
      position:sticky; top:60px; z-index:60;
    }
    .tab {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 16px; border-radius:10px; border:1px solid transparent;
      cursor:pointer; font-family:"Bungee",Arial,sans-serif; font-size:12px;
      color:#555; background:transparent; transition:all .15s;
    }
    .tab:hover { color:#ccc; background:rgba(255,255,255,.05); }
    .tab.active {
      color:#fff; background:rgba(255,0,0,.15);
      border-color:rgba(255,0,0,.3); box-shadow:0 0 12px rgba(255,0,0,.1);
    }

    /* Content area */
    .wrap { padding:28px 22px 60px; max-width:720px; margin:0 auto; }

    /* Search box */
    .search-row { display:flex; gap:10px; margin-bottom:24px; }
    .search-input {
      flex:1; padding:12px 16px; background:#111; border:1px solid #222;
      border-radius:12px; color:#fff; font-family:"Bungee",Arial,sans-serif;
      font-size:13px; outline:none; transition:border-color .15s;
    }
    .search-input:focus { border-color:rgba(255,0,0,.4); }
    .search-btn {
      padding:12px 20px; background:var(--accent); border:none; border-radius:12px;
      color:#fff; font-family:"Bungee",Arial,sans-serif; font-size:12px;
      cursor:pointer; white-space:nowrap; transition:box-shadow .15s;
    }
    .search-btn:hover:not(:disabled) { box-shadow:0 0 14px var(--accent); }
    .search-btn:disabled { opacity:.5; cursor:not-allowed; }

    /* User card */
    .user-card {
      display:flex; align-items:center; gap:14px;
      background:#111; border:1px solid #1e1e1e; border-radius:14px;
      padding:14px 16px; margin-bottom:10px;
    }
    .user-avatar {
      width:46px; height:46px; border-radius:50%; flex-shrink:0;
      background:#1a1a1a; border:2px solid rgba(255,0,0,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; color:rgba(255,0,0,.6); overflow:hidden;
    }
    .user-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .user-info { flex:1; min-width:0; }
    .user-name { font-size:13px; color:#fff; margin:0 0 3px; }
    .user-email { font-size:11px; color:#555; margin:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .user-actions { display:flex; gap:8px; flex-shrink:0; }

    /* Action buttons */
    .btn-primary {
      padding:8px 14px; background:rgba(255,0,0,.15); border:1px solid rgba(255,0,0,.3);
      border-radius:9px; color:#ff9999; font-family:"Bungee",Arial,sans-serif;
      font-size:11px; cursor:pointer; transition:background .15s;
    }
    .btn-primary:hover { background:rgba(255,0,0,.28); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
    .btn-ghost {
      padding:8px 14px; background:transparent; border:1px solid #2a2a2a;
      border-radius:9px; color:#666; font-family:"Bungee",Arial,sans-serif;
      font-size:11px; cursor:pointer; transition:color .15s, border-color .15s;
    }
    .btn-ghost:hover { color:#ccc; border-color:#555; }
    .btn-danger {
      padding:8px 14px; background:transparent; border:1px solid rgba(192,57,43,.3);
      border-radius:9px; color:rgba(192,57,43,.8); font-family:"Bungee",Arial,sans-serif;
      font-size:11px; cursor:pointer; transition:background .15s;
    }
    .btn-danger:hover { background:rgba(192,57,43,.15); }

    /* State messages */
    .state { text-align:center; padding:50px 20px; color:var(--muted); }
    .state i { font-size:36px; opacity:.2; display:block; margin-bottom:12px; }
    .state p { margin:0; font-size:12px; }
    .msg-bar { font-size:12px; padding:10px 14px; border-radius:10px; margin-bottom:16px; }
    .msg-bar.ok  { background:rgba(76,175,80,.12); border:1px solid rgba(76,175,80,.3); color:#81c784; }
    .msg-bar.err { background:rgba(244,67,54,.1);  border:1px solid rgba(244,67,54,.3); color:#e57373; }
    .msg-bar.inf { background:rgba(255,0,0,.08);   border:1px solid rgba(255,0,0,.2);   color:#ff9999; }

    /* Compare modal */
    .cmp-overlay {
      position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.9);
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .cmp-overlay.active { opacity:1; pointer-events:auto; }
    .cmp-modal {
      background:#111; border:1px solid #1e1e1e; border-radius:20px;
      width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
      transform:scale(.94); transition:transform .2s; scrollbar-width:thin;
    }
    .cmp-overlay.active .cmp-modal { transform:scale(1); }
    .cmp-header {
      position:sticky; top:0; z-index:1;
      display:flex; align-items:center; gap:12px;
      padding:18px 22px; background:#111; border-bottom:1px solid #1a1a1a;
    }
    .cmp-body { padding:20px 22px; }
    .cmp-stat { text-align:center; margin-bottom:20px; }
    .cmp-count { font-size:42px; color:#ff9999; line-height:1; }
    .cmp-label { font-size:11px; color:#555; margin-top:4px; }
    .cmp-item {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; background:#0d0d0d; border:1px solid #1a1a1a;
      border-radius:10px; margin-bottom:8px;
    }
    .cmp-thumb { width:32px; height:42px; object-fit:cover; border-radius:5px; flex-shrink:0; background:#1a1a1a; }
    .cmp-info { flex:1; min-width:0; }
    .cmp-title { font-size:11px; color:#ccc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cmp-chips { display:flex; gap:4px; margin-top:3px; flex-wrap:wrap; }
    .cmp-chip { font-size:9px; padding:2px 6px; border-radius:999px; background:#1a1a1a; border:1px solid #252525; color:#666; }
    .cmp-chip.red { color:#ff9999; border-color:rgba(255,0,0,.2); background:rgba(255,0,0,.07); }

    /* Wishlist modal */
    .wl-overlay {
      position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.9);
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .wl-overlay.active { opacity:1; pointer-events:auto; }
    .wl-modal {
      background:#111; border:1px solid #1e1e1e; border-radius:20px;
      width:100%; max-width:720px; max-height:88vh; overflow-y:auto;
      transform:scale(.94); transition:transform .2s; scrollbar-width:thin;
    }
    .wl-overlay.active .wl-modal { transform:scale(1); }
    .wl-header {
      position:sticky; top:0; z-index:1;
      display:flex; align-items:center; gap:12px;
      padding:18px 22px; background:#111;
      border-bottom:1px solid #1a1a1a;
    }
    .wl-avatar {
      width:36px; height:36px; border-radius:50%; overflow:hidden;
      background:#1a1a1a; border:2px solid rgba(255,0,0,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:16px; color:rgba(255,0,0,.6); flex-shrink:0;
    }
    .wl-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .wl-title { font-size:14px; color:#fff; flex:1; }
    .wl-close {
      background:#1a1a1a; border:1px solid #333; border-radius:9px;
      color:#aaa; padding:6px 12px; cursor:pointer;
      font-family:"Bungee",Arial,sans-serif; font-size:11px;
    }
    .wl-close:hover { color:#fff; border-color:#555; }
    .wl-grid {
      display:grid; gap:12px;
      grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
      padding:18px 22px;
    }
    .wl-card {
      background:#0d0d0d; border:1px solid #1b1b1b; border-radius:12px; overflow:hidden;
    }
    .wl-thumb { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:#111; }
    .wl-body { padding:8px 10px 10px; }
    .wl-card-title {
      font-size:10px; line-height:1.3; margin:0 0 6px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .wl-chips { display:flex; gap:4px; flex-wrap:wrap; }
    .wl-chip {
      font-size:9px; padding:2px 6px; border-radius:999px;
      background:#1a1a1a; border:1px solid #252525; color:#666;
    }
    .wl-chip.red { color:#ff9999; border-color:rgba(255,0,0,.2); background:rgba(255,0,0,.07); }
    .wl-empty { text-align:center; padding:40px; color:#444; font-size:12px; }
  </style>
</head>
<body>
  <script type="module" src="js/auth-guard.js"></script>
  <nav id="app-nav"></nav>
  <script src="js/nav.js" defer></script>

  <!-- Compare Modal -->
  <div class="cmp-overlay" id="cmpOverlay">
    <div class="cmp-modal">
      <div class="cmp-header">
        <span class="wl-title" id="cmpTitle">Compare</span>
        <button class="wl-close" id="cmpClose"><i class="fa-solid fa-xmark"></i> Close</button>
      </div>
      <div class="cmp-body">
        <div class="cmp-stat">
          <div class="cmp-count" id="cmpCount">—</div>
          <div class="cmp-label">titles you both track</div>
        </div>
        <div id="cmpList"></div>
      </div>
    </div>
  </div>

  <!-- Wishlist Modal -->
  <div class="wl-overlay" id="wlOverlay">
    <div class="wl-modal">
      <div class="wl-header">
        <div class="wl-avatar" id="wlAvatar"><i class="fa-solid fa-circle-user"></i></div>
        <span class="wl-title" id="wlTitle">Wishlist</span>
        <button class="wl-close" id="wlClose"><i class="fa-solid fa-xmark"></i> Close</button>
      </div>
      <div class="wl-grid" id="wlGrid"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab active" data-tab="find">   <i class="fa-solid fa-magnifying-glass"></i> Find Friends</button>
    <button class="tab"        data-tab="requests"><i class="fa-solid fa-user-clock"></i>       Requests</button>
    <button class="tab"        data-tab="friends"> <i class="fa-solid fa-user-group"></i>       My Friends</button>
  </div>

  <div class="wrap">
    <div id="msgBar" class="msg-bar" style="display:none;"></div>

    <!-- FIND TAB -->
    <div id="paneFind">
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="Enter exact username..." maxlength="20" />
        <button class="search-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      </div>
      <div id="searchResult"></div>
    </div>

    <!-- REQUESTS TAB -->
    <div id="paneRequests" style="display:none;">
      <div id="requestsList"></div>
    </div>

    <!-- FRIENDS TAB -->
    <div id="paneFriends" style="display:none;">
      <div id="friendsList"></div>
    </div>
  </div>

  <script type="module">
    import {
      searchUserByUsername,
      sendFriendRequest,
      getFriendRequests,
      acceptFriendRequest,
      declineFriendRequest,
      getFriends,
      getFriendWishlist,
      removeFriend,
      getSharedTitles
    } from "./js/firebase-service.js";

    import { getApps, getApp, initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth }                         from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { firebaseConfig }                  from "./js/firebase-config.js";

    const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);

    /* ── DOM ── */
    const searchInput   = document.getElementById('searchInput');
    const searchBtn     = document.getElementById('searchBtn');
    const searchResult  = document.getElementById('searchResult');
    const requestsList  = document.getElementById('requestsList');
    const friendsList   = document.getElementById('friendsList');
    const msgBar        = document.getElementById('msgBar');
    const cmpOverlay    = document.getElementById('cmpOverlay');
    const cmpTitle      = document.getElementById('cmpTitle');
    const cmpCount      = document.getElementById('cmpCount');
    const cmpList       = document.getElementById('cmpList');
    const cmpClose      = document.getElementById('cmpClose');
    const wlOverlay     = document.getElementById('wlOverlay');
    const wlGrid        = document.getElementById('wlGrid');
    const wlTitle       = document.getElementById('wlTitle');
    const wlAvatar      = document.getElementById('wlAvatar');
    const wlClose       = document.getElementById('wlClose');

    /* ── Tabs ── */
    let activeTab = 'find';
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        document.getElementById('paneFind').style.display     = activeTab === 'find'     ? '' : 'none';
        document.getElementById('paneRequests').style.display = activeTab === 'requests' ? '' : 'none';
        document.getElementById('paneFriends').style.display  = activeTab === 'friends'  ? '' : 'none';
        hideMsg();
        if (activeTab === 'requests') loadRequests();
        if (activeTab === 'friends')  loadFriends();
      });
    });

    /* ── Message bar ── */
    function showMsg(text, type = 'ok') {
      msgBar.textContent  = text;
      msgBar.className    = `msg-bar ${type}`;
      msgBar.style.display = '';
    }
    function hideMsg() { msgBar.style.display = 'none'; }

    /* ── Avatar helper ── */
    function avatarHtml(photoURL, size = 46) {
      return photoURL
        ? `<img src="${photoURL}" alt="pfp" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;">`
        : `<i class="fa-solid fa-circle-user"></i>`;
    }

    /* ── FIND ── */
    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      searchBtn.disabled = true;
      searchBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      searchResult.innerHTML = '';
      hideMsg();

      try {
        const me   = auth.currentUser;
        const user = await searchUserByUsername(q);

        if (!user) {
          searchResult.innerHTML = `<div class="state"><i class="fa-solid fa-user-slash"></i><p>No user found with that username.</p></div>`;
          return;
        }
        if (user.uid === me.uid) {
          searchResult.innerHTML = `<div class="state"><i class="fa-solid fa-face-smile-wink"></i><p>That's you!</p></div>`;
          return;
        }

        // Check if already friends
        const friends = await getFriends();
        const isFriend = friends.some(f => f.uid === user.uid);

        searchResult.innerHTML = `
          <div class="user-card">
            <div class="user-avatar">${avatarHtml(user.photoURL)}</div>
            <div class="user-info">
              <p class="user-name">${esc(user.username || user.uid)}</p>
              <p class="user-email">${esc(user.email)}</p>
            </div>
            <div class="user-actions">
              ${isFriend
                ? `<span class="btn-ghost" style="cursor:default;">Already friends</span>`
                : `<button class="btn-primary" id="sendReqBtn"><i class="fa-solid fa-user-plus"></i> Add Friend</button>`
              }
            </div>
          </div>`;

        if (!isFriend) {
          document.getElementById('sendReqBtn').addEventListener('click', async (e) => {
            e.target.disabled = true;
            e.target.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            try {
              await sendFriendRequest(user.uid);
              e.target.outerHTML = `<span class="btn-ghost" style="cursor:default;color:#81c784;">Request Sent!</span>`;
              showMsg('Friend request sent!', 'ok');
            } catch (err) {
              showMsg(err.message || 'Failed to send request.', 'err');
              e.target.disabled = false;
              e.target.innerHTML = '<i class="fa-solid fa-user-plus"></i> Add Friend';
            }
          });
        }
      } catch (err) {
        showMsg(err.message || 'Search failed.', 'err');
      } finally {
        searchBtn.disabled = false;
        searchBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Search';
      }
    }

    /* ── REQUESTS ── */
    async function loadRequests() {
      requestsList.innerHTML = `<div class="state"><i class="fa-solid fa-spinner fa-spin" style="opacity:.4;"></i><p>Loading...</p></div>`;
      try {
        const requests = await getFriendRequests();
        if (!requests.length) {
          requestsList.innerHTML = `<div class="state"><i class="fa-solid fa-inbox"></i><p>No pending requests.</p></div>`;
          return;
        }
        requestsList.innerHTML = requests.map(r => `
          <div class="user-card" id="req-${r.id}">
            <div class="user-avatar">${avatarHtml(r.photoURL)}</div>
            <div class="user-info">
              <p class="user-name">${esc(r.username || r.fromUid)}</p>
              <p class="user-email">Wants to be your friend</p>
            </div>
            <div class="user-actions">
              <button class="btn-primary" onclick="handleAccept('${r.id}', this)" data-username="${esc(r.username)}" data-photo="${esc(r.photoURL)}">
                <i class="fa-solid fa-check"></i> Accept
              </button>
              <button class="btn-ghost" onclick="handleDecline('${r.id}', this)">
                Decline
              </button>
            </div>
          </div>`).join('');
      } catch (err) {
        requestsList.innerHTML = `<div class="state"><i class="fa-solid fa-circle-exclamation"></i><p>${err.message}</p></div>`;
      }
    }

    window.handleAccept = async (fromUid, btn) => {
      btn.disabled = true;
      const fromData = { username: btn.dataset.username, photoURL: btn.dataset.photo };
      try {
        await acceptFriendRequest(fromUid, fromData);
        document.getElementById(`req-${fromUid}`)?.remove();
        showMsg('Friend added!', 'ok');
        if (!requestsList.querySelector('.user-card')) {
          requestsList.innerHTML = `<div class="state"><i class="fa-solid fa-inbox"></i><p>No pending requests.</p></div>`;
        }
      } catch (err) {
        showMsg(err.message || 'Failed to accept.', 'err');
        btn.disabled = false;
      }
    };

    window.handleDecline = async (fromUid, btn) => {
      btn.disabled = true;
      try {
        await declineFriendRequest(fromUid);
        document.getElementById(`req-${fromUid}`)?.remove();
        if (!requestsList.querySelector('.user-card')) {
          requestsList.innerHTML = `<div class="state"><i class="fa-solid fa-inbox"></i><p>No pending requests.</p></div>`;
        }
      } catch (err) {
        showMsg(err.message || 'Failed to decline.', 'err');
        btn.disabled = false;
      }
    };

    /* ── FRIENDS ── */
    async function loadFriends() {
      friendsList.innerHTML = `<div class="state"><i class="fa-solid fa-spinner fa-spin" style="opacity:.4;"></i><p>Loading...</p></div>`;
      try {
        const friends = await getFriends();
        if (!friends.length) {
          friendsList.innerHTML = `<div class="state"><i class="fa-solid fa-user-group"></i><p>No friends yet. Find some in the Find tab!</p></div>`;
          return;
        }
        friendsList.innerHTML = friends.map(f => `
          <div class="user-card" id="friend-${f.uid}">
            <div class="user-avatar">${avatarHtml(f.photoURL)}</div>
            <div class="user-info">
              <p class="user-name">${esc(f.username || f.uid)}</p>
            </div>
            <div class="user-actions">
              <button class="btn-primary" onclick="viewWishlist('${f.uid}','${esc(f.username)}','${esc(f.photoURL)}')">
                <i class="fa-solid fa-book-open"></i> Wishlist
              </button>
              <button class="btn-ghost" onclick="compareWith('${f.uid}','${esc(f.username)}')">
                <i class="fa-solid fa-code-compare"></i> Compare
              </button>
              <button class="btn-danger" onclick="handleRemove('${f.uid}', this)">
                <i class="fa-solid fa-user-minus"></i>
              </button>
            </div>
          </div>`).join('');
      } catch (err) {
        friendsList.innerHTML = `<div class="state"><i class="fa-solid fa-circle-exclamation"></i><p>${err.message}</p></div>`;
      }
    }

    window.handleRemove = async (friendUid, btn) => {
      if (!confirm('Remove this friend?')) return;
      btn.disabled = true;
      try {
        await removeFriend(friendUid);
        document.getElementById(`friend-${friendUid}`)?.remove();
        if (!friendsList.querySelector('.user-card')) {
          friendsList.innerHTML = `<div class="state"><i class="fa-solid fa-user-group"></i><p>No friends yet.</p></div>`;
        }
      } catch (err) {
        showMsg(err.message || 'Failed to remove.', 'err');
        btn.disabled = false;
      }
    };

    /* ── WISHLIST MODAL ── */
    window.viewWishlist = async (friendUid, username, photoURL) => {
      wlTitle.textContent = `${username}'s Wishlist`;
      wlAvatar.innerHTML  = avatarHtml(photoURL, 36);
      wlGrid.innerHTML    = `<div style="grid-column:1/-1;text-align:center;padding:30px;color:#444;font-size:12px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>`;
      wlOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      try {
        const items = await getFriendWishlist(friendUid);
        if (!items.length) {
          wlGrid.innerHTML = `<div class="wl-empty">This friend's library is empty.</div>`;
          return;
        }
        wlGrid.innerHTML = items.map(it => `
          <div class="wl-card">
            <img class="wl-thumb" src="${esc(it.cover_path || '')}" alt="${esc(it.title)}" loading="lazy"
                 onerror="this.src='https://via.placeholder.com/150x200?text=No+Image'">
            <div class="wl-body">
              <p class="wl-card-title">${esc(it.title)}</p>
              <div class="wl-chips">
                <span class="wl-chip red">${esc(it.type || '')}</span>
                <span class="wl-chip">${esc(it.status || '')}</span>
              </div>
            </div>
          </div>`).join('');
      } catch (err) {
        wlGrid.innerHTML = `<div class="wl-empty">${err.message}</div>`;
      }
    };

    function closeWl() {
      wlOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }
    wlClose.addEventListener('click', closeWl);
    wlOverlay.addEventListener('click', e => { if (e.target === wlOverlay) closeWl(); });

    /* ── COMPARE ── */
    const statusLabel = { watching:'Watching', reading:'Reading', completed:'Completed', on_hold:'On Hold', dropped:'Dropped', planning:'Planning', ongoing:'Watching', hiatus:'On Hold' };

    window.compareWith = async (friendUid, username) => {
      cmpTitle.textContent = `You & ${username}`;
      cmpCount.textContent = '…';
      cmpList.innerHTML    = `<div style="text-align:center;padding:20px;color:#555;font-size:12px;"><i class="fa-solid fa-spinner fa-spin"></i></div>`;
      cmpOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      try {
        const shared = await getSharedTitles(friendUid);
        cmpCount.textContent = shared.length;
        if (!shared.length) {
          cmpList.innerHTML = `<div style="text-align:center;color:#444;font-size:11px;padding:10px 0;">No shared titles yet.</div>`;
          return;
        }
        cmpList.innerHTML = shared.map(it => `
          <div class="cmp-item">
            <img class="cmp-thumb" src="${esc(it.cover_path||'')}" onerror="this.style.display='none'" loading="lazy">
            <div class="cmp-info">
              <div class="cmp-title">${esc(it.title)}</div>
              <div class="cmp-chips">
                <span class="cmp-chip red">${esc(it.type||'')}</span>
                <span class="cmp-chip">You: ${esc(statusLabel[it.myItem?.status]||it.myItem?.status||'—')}</span>
                <span class="cmp-chip">Them: ${esc(statusLabel[it.status]||it.status||'—')}</span>
                ${it.myItem?.rating != null ? `<span class="cmp-chip" style="color:#f5c518;border-color:#f5c51833">★ ${it.myItem.rating}</span>` : ''}
              </div>
            </div>
          </div>`).join('');
      } catch(e) {
        cmpList.innerHTML = `<div style="text-align:center;color:#e57373;font-size:11px;">${e.message}</div>`;
      }
    };

    function closeCmp() {
      cmpOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }
    cmpClose.addEventListener('click', closeCmp);
    cmpOverlay.addEventListener('click', e => { if (e.target === cmpOverlay) closeCmp(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeWl(); closeCmp(); } });

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Clear badge when visiting requests tab
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tab === 'requests') sessionStorage.setItem('friendReqCount', '0');
      });
    });
  </script>
</body>
</html>
